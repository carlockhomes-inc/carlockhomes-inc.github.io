<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【緊急連絡窓口】カーロックホームズ株式会社</title>
    <style>
        :root {
            --navy: #001a33;
            --gold: #c5a059;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--navy);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 30px;
            color: var(--gold);
        }
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .contact-box {
            background: rgba(197, 160, 89, 0.1);
            padding: 25px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: left;
        }
        .contact-item {
            margin-bottom: 15px;
        }
        .label {
            color: var(--gold);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 5px;
        }
        .value {
            font-size: 18px;
            font-weight: bold;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.5;
        }
        a { color: inherit; text-decoration: none; }
        .btn-call {
            display: inline-block;
            background: var(--gold);
            color: var(--navy);
            padding: 15px 30px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-call:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">CARLOCK HOMES</div>
        <h1>現在、システムメンテナンス中です</h1>
        <p>お客様にはご不便をおかけしております。<br>緊急のご依頼やお問い合わせは、下記窓口まで直接お電話をいただけますようお願い申し上げます。</p>
        
        <div class="contact-box">
            <div class="contact-item">
                <span class="label">Emergency Call</span>
                <span class="value"><a href="tel:0353110556">03-5311-0556</a></span>
            </div>
            <div class="contact-item">
                <span class="label">Email</span>
                <span class="value"><a href="mailto:office@carlock.co.jp">office@carlock.co.jp</a></span>
            </div>
            <div class="contact-item">
                <span class="label">Address</span>
                <span class="value">東京都杉並区西荻北2-37-12<br>ブランシュ西荻 中2階</span>
            </div>
        </div>

        <a href="tel:0353110556" class="btn-call">📞 電話で問い合わせる</a>

        <div class="footer">
            &copy; 2026 CarlockHomes Co., Ltd.
        </div>
    </div>
</body>
</html>
