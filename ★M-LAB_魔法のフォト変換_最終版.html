<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-LAB Magic Photo Lab | Final</title>
    <style>
        :root { --purple: #6c5ce7; --blue: #3498db; --bg: #f5f7fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px 20px; margin: 0; min-height: 100vh; }
        .card { background: #fff; width: 1000px; padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); display: grid; grid-template-columns: 350px 1fr; gap: 40px; }
        h1 { color: var(--purple); margin: 0 0 10px 0; font-size: 1.8em; }
        .desc { color: #666; font-size: 0.9em; margin-bottom: 30px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 0.85em; color: var(--purple); }
        .btn-toggle-grp { display: flex; gap: 8px; }
        .btn-toggle { flex: 1; padding: 10px; border: 2px solid #eee; border-radius: 12px; background: #fff; cursor: pointer; font-weight: bold; font-size: 0.75em; transition: 0.3s; }
        .btn-toggle.active { border-color: var(--purple); background: var(--purple); color: #fff; }
        .preview-pane { background: #2d3436; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; max-height: 750px; }
        .img-container { width: 100%; height: 500px; display: flex; justify-content: center; align-items: center; overflow: hidden; border-radius: 10px; background: #000; margin-bottom: 20px; }
        #p-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-save { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; border: none; border-radius: 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4); }
        input[type="file"], input[type="text"], input[type="range"] { width: 100%; box-sizing: border-box; }
        .sub-panel { margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 15px; }
    </style>
</head>
<body>
<div class="card">
    <div class="controls">
        <h1>Magic Photo Lab</h1>
        <p class="desc">M-LAB公式 魔法のSNS変換ツール</p>
        <div class="form-group">
            <label>1. 写真をアップロード</label>
            <input type="file" id="f-in" accept="image/*">
        </div>
        <div class="form-group">
            <label>2. 変換サイズ</label>
            <div class="btn-toggle-grp" id="ratio-grp">
                <button class="btn-toggle active" data-r="1:1">正方形</button>
                <button class="btn-toggle" data-r="4:5">縦長</button>
                <button class="btn-toggle" data-r="9:16">Story</button>
            </div>
        </div>
        <div class="form-group">
            <label>3. 表示倍率 <span id="v-zoom">100</span>%</label>
            <input type="range" id="zoom-sl" min="0.4" max="1.0" step="0.01" value="1.0">
        </div>
        <div class="form-group">
            <label>4. 魔法のウォーターマーク</label>
            <div class="btn-toggle-grp">
                <button class="btn-toggle" id="wm-on">入れる</button>
                <button class="btn-toggle active" id="wm-off">なし</button>
            </div>
            <div id="wm-sub" style="display:none;" class="sub-panel">
                <div class="btn-toggle-grp" style="margin-bottom:15px;">
                    <button class="btn-toggle active" id="mode-text">文字</button>
                    <button class="btn-toggle" id="mode-logo">ロゴ</button>
                </div>
                <div id="text-opts"><input type="text" id="t-in" value="M-LAB PREMIUM"></div>
                <div id="logo-opts" style="display:none;">
                    <label style="color:#888;">種類</label>
                    <div class="btn-toggle-grp" style="margin-bottom:12px;">
                        <button class="btn-toggle active" id="l-wand" onclick="setLogo('wand')">ステッキ</button>
                        <button class="btn-toggle" id="l-main" onclick="setLogo('main')">メイン</button>
                    </div>
                    <label style="color:#888;">位置</label>
                    <div class="btn-toggle-grp" id="pos-grp" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:12px;">
                        <button class="btn-toggle" data-p="tl">左上</button><button class="btn-toggle" data-p="tr">右上</button>
                        <button class="btn-toggle" data-p="bl">左下</button><button class="btn-toggle active" data-p="br">右下</button>
                    </div>
                    <label style="color:#888;">ロゴの大きさ <span id="v-lsize">250</span>px</label>
                    <input type="range" id="logo-size" min="50" max="600" value="250">
                </div>
            </div>
        </div>
    </div>
    <div class="preview-pane">
        <div class="img-container">
            <canvas id="cv" style="display:none;"></canvas>
            <img id="p-img" src="">
        </div>
        <button class="btn-save" id="save-btn">魔法で保存する ✨</button>
    </div>
</div>

    function setLogo(l) {
        logoType = l;
        document.getElementById('l-wand').classList.toggle('active', l === 'wand');
        document.getElementById('l-main').classList.toggle('active', l === 'main');
        draw();
    }
    
    document.getElementById('wm-on').onclick = () => {
        wmOn = true; btnAct('wm-on','wm-off'); document.getElementById('wm-sub').style.display='block'; draw();
    };
    document.getElementById('wm-off').onclick = () => {
        wmOn = false; btnAct('wm-off','wm-on'); document.getElementById('wm-sub').style.display='none'; draw();
    };
    document.getElementById('mode-text').onclick = () => {
        mode = 'text'; btnAct('mode-text', 'mode-logo');
        document.getElementById('text-opts').style.display='block'; document.getElementById('logo-opts').style.display='none'; draw();
    };
    document.getElementById('mode-logo').onclick = () => {
        mode = 'logo'; btnAct('mode-logo', 'mode-text');
        document.getElementById('text-opts').style.display='none'; document.getElementById('logo-opts').style.display='block'; draw();
    };

    function btnAct(onId, offId) {
        document.getElementById(onId).classList.add('active'); document.getElementById(offId).classList.remove('active');
    }

    document.getElementById('f-in').onchange = (e) => {
        const f = e.target.files[0]; if(!f) return;
        const reader = new FileReader(); reader.onload = (ae) => {
            const i = new Image(); i.onload = () => { srcImg = i; draw(); }; i.src = ae.target.result;
        }; reader.readAsDataURL(f);
    };

    document.getElementById('ratio-grp').onclick = (e) => {
        if(e.target.dataset.r) {
            document.querySelectorAll('#ratio-grp .btn-toggle').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active'); ratio = e.target.dataset.r; draw();
        }
    };
    
    document.getElementById('zoom-sl').oninput = (e) => { document.getElementById('v-zoom').innerText = Math.round(e.target.value * 100); draw(); };
    document.getElementById('pos-grp').onclick = (e) => {
        if(e.target.dataset.p) {
            document.querySelectorAll('#pos-grp .btn-toggle').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active'); pos = e.target.dataset.p; draw();
        }
    };
    document.getElementById('logo-size').oninput = (e) => { document.getElementById('v-lsize').innerText = e.target.value; draw(); };
    document.getElementById('t-in').oninput = draw;

    function draw() {
        if(!srcImg) return;
        let tw = 1080, th = 1080;
        if(ratio==='4:5') th=1350; else if(ratio==='9:16') th=1920;
        cv.width = tw; cv.height = th;
        const z = parseFloat(document.getElementById('zoom-sl').value);
        const ir = srcImg.width/srcImg.height, cr = tw/th;

        ctx.save(); ctx.filter = 'blur(40px) brightness(0.7)';
        let sw, sh, sx, sy;
        if(ir > cr) { sh = srcImg.height; sw = srcImg.height*cr; sx = (srcImg.width-sw)/2; sy=0; }
        else { sw = srcImg.width; sh = srcImg.width/cr; sx=0; sy=(srcImg.height-sh)/2; }
        ctx.drawImage(srcImg, sx, sy, sw, sh, -20, -20, tw+40, th+40);
        ctx.restore();

        let dw, dh, dx, dy;
        if(ir > cr) { dw = tw*z; dh = (tw/ir)*z; } else { dh = th*z; dw = (th*ir)*z; }
        dx=(tw-dw)/2; dy=(th-dh)/2;
        ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=30;
        ctx.drawImage(srcImg, 0, 0, srcImg.width, srcImg.height, dx, dy, dw, dh);

        if(wmOn) {
            ctx.save(); ctx.shadowBlur = 0;
            if(mode === 'text') {
                const t = document.getElementById('t-in').value;
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(tw-350, th-70, 350, 70);
                ctx.font = "bold 28px sans-serif"; ctx.fillStyle="#fff"; ctx.textAlign="right"; ctx.fillText(t, tw-30, th-35);
            } else {
                const img = new Image();
                img.onload = () => {
                    const s = parseInt(document.getElementById('logo-size').value);
                    ctx.globalAlpha = 0.8;
                    let lx, ly;
                    if(pos==='br') { lx = tw-s-30; ly = th-s-30; }
                    else if(pos==='bl') { lx = 30; ly = th-s-30; }
                    else if(pos==='tr') { lx = tw-s-30; ly = 30; }
                    else if(pos==='tl') { lx = 30; ly = 30; }
                    ctx.drawImage(img, lx, ly, s, s);
                    pImg.src = cv.toDataURL('image/jpeg', 0.9);
                };
                img.src = (logoType === 'wand') ? wandSVG : mainLogoB64;
                return;
            }
            ctx.restore();
        }
        pImg.src = cv.toDataURL('image/jpeg', 0.9);
    }
    document.getElementById('save-btn').onclick = () => {
        if(!srcImg) return;
        const a = document.createElement('a'); a.download=`m-lab_${Date.now()}.jpg`;
        a.href = cv.toDataURL('image/jpeg', 0.95); a.click();
    };
</script>
