<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Card Maker | Heartful Family</title>
    <style>
        :root {
            --primary-bg: #fdf6e3;
            --accent-color: #d33682;
            --text-color: #586e75;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #eee8d5;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h1 { color: #b58900; text-align: center; margin-bottom: 5px; font-size: 1.8em; }
        .description { text-align: center; margin-bottom: 25px; font-size: 0.9em; color: #93a1a1; }

        .setup-section {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 20px;
            background: #fdf6e3;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #b58900;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label { font-weight: bold; color: #b58900; }

        input[type="file"] {
            border: 2px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #eee8d5;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            line-height: 1.6;
        }

        .controls { text-align: center; margin-top: 10px; margin-bottom: 30px; }
        
        .btn-main {
            padding: 18px 60px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.3em;
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 6px 20px rgba(211, 54, 130, 0.3);
            transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-2px); background-color: #af2b69; }

        #preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            width: 100%;
        }

        .preview-card {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 15px;
            overflow: hidden;
            background: #fdf6e3;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .preview-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .download-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%; width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 24px; text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .download-btn:hover { background: #fff; transform: scale(1.1); }

        .watermark {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            font-family: sans-serif;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>メッセージカード・メーカー</h1>
    <p class="description">好きな画像を背景にして、みんなの想いを届けよう</p>

    <div class="setup-section">
        <div class="input-group">
            <label>1. 背景画像を選択</label>
            <input type="file" id="bg-input" accept="image/*">
            <small>※ポスター画像や活動写真など</small>
        </div>
        <div class="input-group">
            <label>2. メッセージを貼り付け</label>
            <textarea id="text-input" placeholder="ここにメッセージを入力してください。
空行（エンター2回）を入れると別のカードに分かれます。
改行はそのまま画像に反映されます。"></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="btn-main" onclick="generateCards()">カードを生成する</button>
    </div>

    <div id="preview-container"></div>
</div>

<canvas id="worker-canvas" width="800" height="800" style="display:none;"></canvas>

<script>
    let userBgImage = null;

    // 画像が選ばれた時の処理
    document.getElementById('bg-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                userBgImage = img;
                alert('背景画像を読み込みました！');
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function generateCards() {
        const text = document.getElementById('text-input').value;
        const container = document.getElementById('preview-container');
        const canvas = document.getElementById('worker-canvas');
        const ctx = canvas.getContext('2d');
        
        if (!text.trim()) {
            alert('メッセージを入力してください');
            return;
        }

        container.innerHTML = '生成中...';

        const blocks = text.split(/\n\s*\n/).filter(b => b.trim() !== '');
        container.innerHTML = '';

        blocks.forEach((block, index) => {
            const blockText = block.trim();
            const lines = blockText.split('\n');
            
            ctx.clearRect(0, 0, 800, 800);
            
            // 背景描画
            if (userBgImage) {
                // アスペクト比を保って中央で切り抜き（Cover）
                const canvasAspect = 1;
                const imgAspect = userBgImage.width / userBgImage.height;
                let drawW, drawH, drawX, drawY;
                
                if (imgAspect > canvasAspect) {
                    drawH = userBgImage.height;
                    drawW = userBgImage.height * canvasAspect;
                    drawX = (userBgImage.width - drawW) / 2;
                    drawY = 0;
                } else {
                    drawW = userBgImage.width;
                    drawH = userBgImage.width / canvasAspect;
                    drawX = 0;
                    drawY = (userBgImage.height - drawH) / 2;
                }
                ctx.drawImage(userBgImage, drawX, drawY, drawW, drawH, 0, 0, 800, 800);
            } else {
                // 画像がない場合のデフォルト背景
                const g = ctx.createLinearGradient(0, 0, 800, 800);
                g.addColorStop(0, '#fff9f0'); g.addColorStop(1, '#ffe4e1');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, 800, 800);
            }

            // 文字を読みやすくするためのフィルター
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, 800, 800);
            
            // 枠の装飾
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 4;
            ctx.strokeRect(40, 40, 720, 720);

            // テキスト描画
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
            
            let fontSize = 42;
            if (blockText.length > 50) fontSize = 34;
            if (blockText.length > 120) fontSize = 26;
            ctx.font = `bold ${fontSize}px "Hiragino Mincho ProN", serif`;
            
            const lineHeight = fontSize * 1.8;
            const totalHeight = lines.length * lineHeight;
            let startY = 400 - (totalHeight / 2) + (lineHeight / 2);

            lines.forEach((line, i) => {
                ctx.fillText(line, 400, startY + (i * lineHeight));
            });

            // プレビュー生成
            const dataUrl = canvas.toDataURL('image/png');
            const div = document.createElement('div');
            div.className = 'preview-card';
            div.innerHTML = `
                <img src="${dataUrl}">
                <div class="watermark">Heartful Family Message</div>
                <a href="${dataUrl}" download="message_card_${index+1}.png" class="download-btn" title="画像を保存">📥</a>
            `;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
