<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-LAB | Sea & Music Artistic T-Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Serif+JP:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --depth: #050a14; --border: rgba(197, 160, 89, 0.2); }
        * { box-sizing: border-box; }
        body { background: var(--depth); color: #fff; font-family: 'Inter', 'Noto Serif JP', serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 20px 40px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; letter-spacing: 0.1em; color: var(--gold); }
        .main { display: grid; grid-template-columns: 320px 1fr 320px; flex: 1; overflow: hidden; }
        .side { background: rgba(10, 15, 25, 0.95); padding: 30px; border-right: 1px solid var(--border); overflow-y: auto; }
        .side-r { border-right: none; border-left: 1px solid var(--border); }
        .preview { position: relative; background: radial-gradient(circle at 50% 50%, #1a2a44 0%, #050a14 100%); display: flex; align-items: center; justify-content: center; }
        .t-canvas { position: relative; width: 750px; height: 750px; filter: drop-shadow(0 20px 50px rgba(0,0,0,0.8)); }
        svg { width: 100%; height: 100%; }
        #body-layer { fill: #ffffff; transition: 0.4s; }
        .logo-unit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); cursor: move; mix-blend-mode: multiply; }
        .logo-unit img { width: 100%; height: 100%; }
        .ctrl { margin-bottom: 30px; }
        .label { color: var(--gold); font-size: 0.7rem; font-weight: 800; letter-spacing: 0.2em; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 15px; display: block; }
        input[type="range"] { width: 100%; accent-color: var(--gold); }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: 900; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #e8c68c; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3); }
        .upload-box { border: 2px dashed #333; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
    </style>
</head>
<body>
<header><div class="logo-text">M-LAB ARTISTIC SEA STUDIO</div></header>
<div class="main">
    <div class="side">
        <span class="label">COLOR SELECTION</span>
        <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:8px;">
            <div onclick="uC('#ffffff')" style="background:#fff; height:30px; cursor:pointer; border-radius:3px;"></div>
            <div onclick="uC('#0a1128')" style="background:#0a1128; height:30px; cursor:pointer; border-radius:3px;"></div>
            <div onclick="uC('#1a1a1a')" style="background:#1a1a1a; height:30px; cursor:pointer; border-radius:3px;"></div>
            <div onclick="uC('#4a0e0e')" style="background:#4a0e0e; height:30px; cursor:pointer; border-radius:3px;"></div>
            <div onclick="uC('#103a26')" style="background:#103a26; height:30px; cursor:pointer; border-radius:3px;"></div>
        </div>
        <br><br>
        <span class="label">LOGO ASSET</span>
        <label class="upload-box">
            ⚓️ LOGOをアップロード
            <input type="file" id="f" style="display:none" onchange="hL(event)">
        </label>
    </div>
    <div class="preview">
        <div class="t-canvas">
            <svg viewBox="0 0 1000 1000">
                <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="white" stop-opacity="0.2"/><stop offset="1" stop-color="black" stop-opacity="0.1"/></linearGradient></defs>
                <path id="body-layer" d="M500,225 C420,225 360,250 330,285 L200,325 L80,580 L220,640 L300,510 L300,960 C300,985 410,1000 500,1000 S700,985 700,960 L700,510 L780,640 L920,580 L800,325 L670,285 C640,250 580,225 500,225 Z"/>
                <path fill="url(#g)" d="M500,225 C420,225 360,250 330,285 L200,325 L80,580 L220,640 L300,510 L300,960 C300,985 410,1000 500,1000 S700,985 700,960 L700,510 L780,640 L920,580 L800,325 L670,285 C640,250 580,225 500,225 Z"/>
            </svg>
            <div class="logo-unit" id="l" style="width:200px;"><img id="i" src="" style="display:none"></div>
        </div>
    </div>
    <div class="side side-r">
        <span class="label">CALIBRATION</span>
        <div class="ctrl">サイズ <input type="range" min="50" max="600" value="200" oninput="uD()"></div>
        <div class="ctrl">透明度 <input type="range" min="0" max="1" step="0.01" value="1" oninput="uD()"></div>
        <br>
        <button class="btn" onclick="alert('デザインを保存しました⚓️')">SAVE DESIGN</button>
    </div>
</div>
<script>
    const l=document.getElementById('l'), i=document.getElementById('i');
    let isD=false, ox, oy;
    function uC(c){ document.getElementById('body-layer').style.fill=c; }
    function hL(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=a=>{i.src=a.target.result;i.style.display='block';uD();}; r.readAsDataURL(f); }
    function uD(){ l.style.width=document.querySelectorAll('input')[0].value+'px'; i.style.opacity=document.querySelectorAll('input')[1].value; }
    l.onmousedown=e=>{ isD=true; ox=e.clientX-l.offsetLeft; oy=e.clientY-l.offsetTop; document.onmousemove=m=>{ if(!isD)return; l.style.left=(m.clientX-ox+l.offsetWidth/2)+'px'; l.style.top=(m.clientY-oy+l.offsetHeight/2)+'px'; }; document.onmouseup=()=>{isD=false;}; };
</script>
</body>
</html>
