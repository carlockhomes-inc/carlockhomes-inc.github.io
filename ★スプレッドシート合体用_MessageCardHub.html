<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Card Maker | Sheet Sync Pro LARGE</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;700&family=Kaisei+Opti:wght@700&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-gold: #a67c37;
            --bg-dark: #0f1115;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-light: #e0e0e0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #1a1c23, #0f1115);
            color: var(--text-light);
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .header-bar { 
            background: rgba(0,0,0,0.5); padding: 15px 30px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-glass);
        }
        .header-bar h1 { font-family: 'Noto Serif JP', serif; font-size: 1.2em; margin: 0; color: var(--primary-gold); letter-spacing: 0.1em; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* 👈 Settings Panel (Scrollable) */
        .sidebar-settings {
            width: 350px; background: rgba(255,255,255,0.02);
            border-right: 1px solid var(--border-glass);
            padding: 25px; overflow-y: auto; box-sizing: border-box;
            scrollbar-width: thin; scrollbar-color: var(--primary-gold) transparent;
        }

        /* 👉 Preview Panel (Scrollable) */
        .preview-content {
            flex: 1; padding: 40px; overflow-y: auto; background: rgba(0,0,0,0.2);
            scrollbar-width: thin; scrollbar-color: var(--primary-gold) transparent;
        }

        .section { background: var(--card-glass); border: 1px solid var(--border-glass); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .section-label { color: var(--primary-gold); font-weight: 700; font-size: 0.85em; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .section-label span { background: var(--primary-gold); color: black; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 10px; font-weight: 900; }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-group label { font-size: 11px; opacity: 0.7; font-weight: 600; color: var(--primary-gold); }

        .setting-input { background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 8px; padding: 10px; color: white; font-size: 13px; width: 100%; box-sizing: border-box; }

        .btn-main { background: linear-gradient(135deg, var(--primary-gold), var(--dark-gold)); color: #000; border: none; padding: 15px; border-radius: 30px; font-weight: 700; font-size: 1em; cursor: pointer; width: 100%; margin: 10px 0 20px; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); }

        .mode-selector { display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 4px; border-radius: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 8px; border-radius: 6px; border: none; background: transparent; color: white; cursor: pointer; font-size: 10px; font-weight: bold; }
        .mode-btn.active { background: var(--primary-gold); color: black; }

        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .card-item { position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-glass); background: #000; }
        .card-item img { width: 100%; display: block; }
        .card-actions { background: #111; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-save { width: 100%; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; background: white; color: black; }
        .btn-save:hover { background: var(--primary-gold); }

        .sync-badge { font-size: 10px; text-align: center; padding: 10px; border-radius: 8px; background: rgba(197, 160, 89, 0.1); color: var(--primary-gold); margin-bottom: 20px; border: 1px dashed var(--primary-gold); }
    </style>
</head>
<body>

<div class="header-bar">
    <h1>M-LAB Card Maker Pro</h1>
    <div style="font-size: 11px; color: var(--primary-gold); font-weight: bold;">[ SHEETS LARGE VIEW ]</div>
</div>

<div class="main-layout">
    <!-- LEFT: SETTINGS -->
    <div class="sidebar-settings">
        <div class="section">
            <div class="section-label"><span>1</span> DATA SYNC</div>
            <div class="mode-selector">
                <button id="mode-a" class="mode-btn active" onclick="setMode('A')">A列:Msg</button>
                <button id="mode-b" class="mode-btn" onclick="setMode('B')">A:Msg + B:署名</button>
            </div>
            <button class="btn-main" onclick="fetchSheetData()">シートから同期する</button>
            <button class="btn-main" id="btn-batch-drive" onclick="batchSaveToDrive()" style="background: linear-gradient(135deg, #4285f4, #34a853); color: white; display:none; margin-top: -10px;">Googleドライブに一括保存</button>
            <div id="data-status" class="sync-badge" style="display:none;">---</div>
        </div>

        <div class="section">
            <div class="section-label"><span>2</span> DESIGN</div>
            <div class="input-group">
                <label>写真を選択</label>
                <input type="file" id="bg-input" accept="image/*" class="setting-input">
            </div>
            <div class="input-group">
                <label>高品質テーマ</label>
                <select id="bg-preset" class="setting-input">
                    <option value="none">-- 選択 --</option>
                    <option value="dark">漆黒 (Dark)</option>
                    <option value="marble">大理石 (Marble)</option>
                    <option value="silk">シルク (Silk)</option>
                    <option value="gold">金箔 (Gold)</option>
                    <option value="paper">和紙 (Washi)</option>
                </select>
            </div>
            <div class="input-group">
                <label>サイズ選定</label>
                <select id="size-select" class="setting-input">
                    <option value="1:1">正方形 (1:1)</option>
                    <option value="9:16">縦長 (9:16)</option>
                    <option value="16:9">横長 (16:9)</option>
                </select>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="input-group"><label>文字色</label><input type="color" id="text-color" value="#ffffff" style="width:100%; height:35px; border:none; background:none;"></div>
                <div class="input-group"><label>枠線色</label><input type="color" id="frame-color" value="#c5a059" style="width:100%; height:35px; border:none; background:none;"></div>
            </div>
            <div class="input-group">
                <label>フォント</label>
                <select id="font-select" class="setting-input">
                    <option value="'Noto Serif JP', serif">明朝体 (Elegant)</option>
                    <option value="'Noto Sans JP', sans-serif">ゴシック (Modern)</option>
                    <option value="'Kaisei Opti', serif">装飾字体</option>
                    <option value="'Yuji Syuku', serif">筆文字風</option>
                </select>
            </div>
            <div class="input-group">
                <label>ブランド署名 (固定用)</label>
                <input type="text" id="brand-input" class="setting-input" value="M-LAB PREMIUM">
            </div>
            <div class="input-group"><label>文字サイズ</label><input type="range" id="font-size-range" min="0.5" max="3.0" step="0.1" value="1.0"></div>
            <div class="input-group"><label>枠の太さ</label><input type="range" id="frame-thickness-range" min="0" max="100" step="1" value="20"></div>
            <div class="input-group"><label>背景の暗さ</label><input type="range" id="overlay-range" min="0" max="0.95" step="0.05" value="0.4"></div>
        </div>
    </div>

    <!-- RIGHT: PREVIEW Area -->
    <div class="preview-content">
        <div class="section-label"><span>✨</span> PREVIEW (成果物)</div>
        <div id="preview-grid" class="preview-grid">
            <p style="grid-column: 1/-1; text-align:center; padding: 100px; color:#555; font-size: 14px;">左側の「同期する」ボタンを押すと、カードが生成されます</p>
        </div>

        <div style="margin-top:50px; border-top: 1px solid var(--border-glass); padding-top: 30px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <div class="section-label" style="margin:0;">🏆 Collection (保存済み)</div>
                <button onclick="clearCollection()" style="background:transparent; border:1px solid #ff6b6b; color:#ff6b6b; font-size:10px; padding:5px 10px; border-radius:5px; cursor:pointer;">全クリア</button>
            </div>
            <div id="collection-grid" class="preview-grid"></div>
        </div>
    </div>
</div>

<canvas id="worker-canvas" style="display:none;"></canvas>

<script>
    const presets = {
        marble: 'https://images.unsplash.com/photo-1542283938-238248373393?q=80&w=1200&auto=format&fit=crop',
        silk: 'https://images.unsplash.com/photo-1549490349-8643362247b5?q=80&w=1200&auto=format&fit=crop',
        gold: 'https://images.unsplash.com/photo-1502220389384-75496525977a?q=80&w=1200&auto=format&fit=crop',
        paper: 'https://images.unsplash.com/photo-1598918239080-87a3875a6104?q=80&w=1200&auto=format&fit=crop'
    };

    let userBgImage = null, presetImage = null, currentMode = 'A', sheetData = [];

    function fetchSheetData() {
        document.getElementById('data-status').style.display = 'block';
        document.getElementById('data-status').innerText = '⏳ シートをスキャン中...';
        google.script.run.withSuccessHandler(function(data) {
            sheetData = data.filter(row => row[0] !== "");
            document.getElementById('data-status').innerText = '✅ ' + sheetData.length + '件読み込み完了';
            document.getElementById('btn-batch-drive').style.display = 'block';
            generateCards();
        }).getSheetData();
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-a').classList.toggle('active', mode==='A');
        document.getElementById('mode-b').classList.toggle('active', mode==='B');
        generateCards();
    }

    // Design handling
    document.getElementById('bg-input').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { 
            const img = new Image(); 
            img.onload = () => { userBgImage = img; presetImage = null; document.getElementById('bg-preset').value = 'none'; generateCards(); }; 
            img.src = ev.target.result; 
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('bg-preset').onchange = (e) => {
        userBgImage = null; document.getElementById('bg-input').value = '';
        if(e.target.value==='none'||e.target.value==='dark'){ presetImage=null; generateCards(); return; }
        const img = new Image(); img.crossOrigin = "anonymous"; 
        img.onload = () => { presetImage = img; generateCards(); };
        img.src = presets[e.target.value] + "?cb=" + Date.now();
    };

    async function superSave(canvas, filename) {
        const finalName = filename + '.png';
        const cgrid = document.getElementById('collection-grid');
        const wrapper = document.createElement('div');
        wrapper.className = 'card-item';
        const img = document.createElement('img'); img.src = canvas.toDataURL('image/png');
        wrapper.appendChild(img); cgrid.prepend(wrapper);
        canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = finalName; a.click();
        }, 'image/png');
    }

    function clearCollection() { document.getElementById('collection-grid').innerHTML = ''; }

    // 🌟 新機能: Googleドライブへ一括保存 (1枚ずつ順次処理してエラーを防ぐ)
    async function batchSaveToDrive() {
        if (!sheetData || sheetData.length === 0) return;
        if (!confirm(`全 ${sheetData.length} 枚をGoogleドライブへ保存しますか？\n（完了までブラウザを閉じないでください）`)) return;

        const btn = document.getElementById('btn-batch-drive');
        const status = document.getElementById('data-status');
        btn.disabled = true;
        btn.innerText = '保存処理中...';

        for (let i = 0; i < sheetData.length; i++) {
            status.innerText = `⏳ ドライブへ保存中... (${i+1}/${sheetData.length})`;
            
            // 保存用の画像データを生成
            const canvas = generateSingleCanvas(i);
            const base64 = canvas.toDataURL('image/png').split(',')[1];
            const fileName = `M-LAB_Card_${i+1}.png`;

            try {
                await new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        .saveImageToDrive(base64, fileName); // GAS側の関数を呼び出し
                });
            } catch (e) {
                console.error(e);
                alert(`${i+1}枚目の保存でエラーが発生しました。中断します。`);
                btn.disabled = false;
                btn.innerText = 'Googleドライブに一括保存';
                return;
            }
        }

        status.innerText = `✅ 全${sheetData.length}枚の保存が完了しました！`;
        btn.disabled = false;
        btn.innerText = 'Googleドライブに一括保存';
        alert('全てのカードをGoogleドライブに保存しました。');
    }

    // 特定のインデックスのカードを描画したキャンバスを返すヘルパー
    function generateSingleCanvas(index) {
        const worker = document.getElementById('worker-canvas');
        const ctx = worker.getContext('2d');
        const setup = {
            overlay: document.getElementById('overlay-range').value,
            font: document.getElementById('font-select').value,
            sizeScale: parseFloat(document.getElementById('font-size-range').value),
            frameT: parseFloat(document.getElementById('frame-thickness-range').value),
            ratio: document.getElementById('size-select').value,
            textColor: document.getElementById('text-color').value,
            frameColor: document.getElementById('frame-color').value,
            manualBrand: document.getElementById('brand-input').value || 'M-LAB'
        };

        let w = 1080, h = 1080;
        if(setup.ratio==='9:16') h=1920; else if(setup.ratio==='16:9') w=1920;
        worker.width = w; worker.height = h;

        const row = sheetData[index];
        const mainMsg = String(row[0] || '');
        const subText = (currentMode === 'B') ? (row[1] || '') : setup.manualBrand;
        
        ctx.clearRect(0,0,w,h);
        const bg = userBgImage || presetImage;
        if(bg){
            const a = bg.width/bg.height, ca = w/h; let dw, dh, dx, dy;
            if(a>ca){ dh=bg.height; dw=dh*ca; dx=(bg.width-dw)/2; dy=0; }
            else { dw=bg.width; dh=dw/ca; dx=0; dy=(bg.height-dh)/2; }
            ctx.drawImage(bg, dx, dy, dw, dh, 0, 0, w, h);
        } else { ctx.fillStyle="#0f1115"; ctx.fillRect(0,0,w,h); }
        ctx.fillStyle=`rgba(0,0,0,${setup.overlay})`; ctx.fillRect(0,0,w,h);
        if (setup.frameT > 0) {
            ctx.strokeStyle = setup.frameColor; ctx.lineWidth = setup.frameT;
            const offset = setup.frameT / 2 + (w * 0.04); ctx.strokeRect(offset, offset, w - offset * 2, h - offset * 2);
        }
        ctx.fillStyle = setup.textColor; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.shadowColor="rgba(0,0,0,0.5)"; ctx.shadowBlur=20;
        let sz = (w*0.06)*setup.sizeScale; ctx.font=`600 ${sz}px ${setup.font}`;
        const lines = mainMsg.split(/\\n|\n/);
        lines.forEach((l,i) => ctx.fillText(l.trim(), w/2, h/2 + (i-(lines.length-1)/2)*sz*1.6));
        ctx.font=`bold ${w*0.024}px 'Inter'`; ctx.fillStyle = setup.frameColor;
        ctx.textAlign="right"; ctx.fillText(subText, w-(w*0.08), h-(h*0.08));

        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = w; finalCanvas.height = h;
        finalCanvas.getContext('2d').drawImage(worker, 0, 0);
        return finalCanvas;
    }

    function generateCards() {
        const container = document.getElementById('preview-grid');
        const worker = document.getElementById('worker-canvas');
        const ctx = worker.getContext('2d');
        const setup = {
            overlay: document.getElementById('overlay-range').value,
            font: document.getElementById('font-select').value,
            sizeScale: parseFloat(document.getElementById('font-size-range').value),
            frameT: parseFloat(document.getElementById('frame-thickness-range').value),
            ratio: document.getElementById('size-select').value,
            textColor: document.getElementById('text-color').value,
            frameColor: document.getElementById('frame-color').value,
            manualBrand: document.getElementById('brand-input').value || 'M-LAB'
        };
        if (sheetData.length === 0) return;
        let w = 1080, h = 1080;
        if(setup.ratio==='9:16') h=1920; else if(setup.ratio==='16:9') w=1920;
        worker.width = w; worker.height = h;
        container.innerHTML = '';

        sheetData.forEach((row, index) => {
            const mainMsg = row[0] || '';
            const subText = (currentMode === 'B') ? (row[1] || '') : setup.manualBrand;
            ctx.clearRect(0,0,w,h);
            const bg = userBgImage || presetImage;
            if(bg){
                const a = bg.width/bg.height, ca = w/h; let dw, dh, dx, dy;
                if(a>ca){ dh=bg.height; dw=dh*ca; dx=(bg.width-dw)/2; dy=0; }
                else { dw=bg.width; dh=dw/ca; dx=0; dy=(bg.height-dh)/2; }
                ctx.drawImage(bg, dx, dy, dw, dh, 0, 0, w, h);
            } else { ctx.fillStyle="#0f1115"; ctx.fillRect(0,0,w,h); }
            ctx.fillStyle=`rgba(0,0,0,${setup.overlay})`; ctx.fillRect(0,0,w,h);
            if (setup.frameT > 0) {
                ctx.strokeStyle = setup.frameColor; ctx.lineWidth = setup.frameT;
                const offset = setup.frameT / 2 + (w * 0.04); ctx.strokeRect(offset, offset, w - offset * 2, h - offset * 2);
            }
            ctx.fillStyle = setup.textColor; ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.shadowColor="rgba(0,0,0,0.5)"; ctx.shadowBlur=20;
            let sz = (w*0.06)*setup.sizeScale; ctx.font=`600 ${sz}px ${setup.font}`;
            const lines = String(mainMsg).split(/\\n|\n/);
            lines.forEach((l,i) => ctx.fillText(l.trim(), w/2, h/2 + (i-(lines.length-1)/2)*sz*1.6));
            ctx.font=`bold ${w*0.024}px 'Inter'`; ctx.fillStyle = setup.frameColor;
            ctx.textAlign="right"; ctx.fillText(subText, w-(w*0.08), h-(h*0.08));
            const cardCanvas = document.createElement('canvas');
            cardCanvas.width = w; cardCanvas.height = h;
            cardCanvas.getContext('2d').drawImage(worker, 0, 0);
            const wrapper = document.createElement('div');
            wrapper.className='card-item';
            const thumb = document.createElement('img'); thumb.src = cardCanvas.toDataURL('image/png');
            const ctrls = document.createElement('div'); ctrls.className = 'card-actions';
            const btn = document.createElement('button'); btn.className = 'btn-save'; btn.innerText = '名前を付けて保存';
            btn.onclick = () => superSave(cardCanvas, `SheetCard_${index+1}`);
            ctrls.appendChild(btn); wrapper.appendChild(thumb); wrapper.appendChild(ctrls); container.appendChild(wrapper);
        });
    }

    document.querySelectorAll('.setting-input, #bg-preset, #size-select, #font-select, #text-color, #frame-color, #frame-thickness-range, #font-size-range, #overlay-range, #brand-input').forEach(el => el.oninput = generateCards);
</script>
</body>
</html>
