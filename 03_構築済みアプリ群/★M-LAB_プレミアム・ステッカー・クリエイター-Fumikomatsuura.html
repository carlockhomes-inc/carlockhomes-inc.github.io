<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-LAB | Sticker Creator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --depth: #0a0e14; }
        body { background: #000; color: #fff; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--gold); letter-spacing: 0.1em; margin: 0; text-transform: uppercase; font-size: 1.5rem; }
        
        .main-stage { display: flex; gap: 50px; align-items: flex-start; max-width: 1000px; width: 100%; }
        .canvas-area { flex: 1; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border-radius: 20px; padding: 50px; border: 1px solid rgba(197, 160, 89, 0.2); box-shadow: 0 40px 100px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        
        /* The Sticker Logic */
        .sticker-base { width: 350px; height: 350px; border-radius: 50%; background: #ffffff; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); position: relative; transition: 0.5s; display: flex; align-items: center; justify-content: center; transform-origin: center; animation: float 6s ease-in-out infinite; }
        .sticker-base img { width: 90%; height: 90%; object-fit: contain; }
        
        /* Texture Overlays */
        .glare { position: absolute; inset: 0; border-radius: 50%; opacity: 0; transition: 0.5s; pointer-events: none; }
        .sticker-base.holo .glare { opacity: 0.6; background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.4) 45%, rgba(255,100,255,0.4) 50%, rgba(100,255,255,0.4) 55%, transparent 100%); }
        .sticker-base.glossy .glare { opacity: 0.4; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8) 0%, transparent 60%); }
        
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-15px) rotate(2deg); } }
        
        .controls { width: 320px; background: rgba(255,255,255,0.03); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .label { color: var(--gold); font-size: 0.65rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 20px; display: block; border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding-bottom: 5px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #888; padding: 15px; border-radius: 8px; cursor: pointer; text-align: left; font-weight: 700; font-size: 13px; transition: 0.3s; }
        .btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn.active { background: var(--gold); color: #000; border-color: transparent; }
        
        .upload-panel { border: 2px dashed #222; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .upload-panel:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
    </style>
</head>
<body>
    <div class="header">
        <h1>M-LAB PREMIER STICKER CREATOR</h1>
        <p style="font-size: 11px; opacity: 0.5;">高品質なシール・プロダクトのプレビュー</p>
    </div>

    <div class="main-stage">
        <div class="canvas-area">
            <div class="sticker-base" id="sticker">
                <div class="glare" id="glare"></div>
                <img id="logo-img" src="" style="display:none">
                <span id="placeholder-text" style="color:#ccc; font-size:12px;">⚓️ LOGOをアップロード</span>
            </div>
        </div>

        <div class="controls">
            <span class="label">TEXTURE SELECTION</span>
            <div class="btn-group">
                <button class="btn active" onclick="setTex('matte', this)">Matte Paper (マット紙)</button>
                <button class="btn" onclick="setTex('glossy', this)">Glossy Finish (光沢仕様)</button>
                <button class="btn" onclick="setTex('holo', this)">Holographic (ホログラム)</button>
            </div>

            <span class="label">CUT STYLE</span>
            <div class="btn-group">
                <button class="btn active" onclick="setShape('round', this)">Standard Round (丸型)</button>
                <button class="btn" onclick="setShape('square', this)">Square (四角形)</button>
            </div>

            <label class="upload-panel">
                📂 ロゴをアップロード<br>
                <span style="font-size:10px; color:#555;">(先ほどの画像を保存して選択)</span>
                <input type="file" style="display:none" onchange="handleUpload(event)">
            </label>
            
            <button class="btn" onclick="alert('プロダクト案として保存しました。')" style="margin-top:30px; width:100%; background:var(--gold); color:#000;">デザインを確定・保存</button>
        </div>
    </div>

    <script>
        const sticker = document.getElementById('sticker');
        const img = document.getElementById('logo-img');
        const placeholder = document.getElementById('placeholder-text');

        function setTex(type, btn) {
            sticker.classList.remove('holo', 'glossy');
            if(type !== 'matte') sticker.classList.add(type);
            updateActive(btn);
        }

        function setShape(shape, btn) {
            sticker.style.borderRadius = (shape === 'round') ? '50%' : '12px';
            document.getElementById('glare').style.borderRadius = (shape === 'round') ? '50%' : '12px';
            updateActive(btn);
        }

        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                img.src = e.target.result;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function updateActive(btn) {
            const btns = btn.parentElement.querySelectorAll('.btn');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
