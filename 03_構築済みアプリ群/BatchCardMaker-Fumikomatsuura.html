<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Card Maker | Heartful Family</title>
    <style>
        :root {
            --primary-bg: #fdf6e3;
            --accent-color: #d33682;
            --text-color: #586e75;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #eee8d5;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h1 { color: #b58900; text-align: center; margin-bottom: 5px; font-size: 1.8em; }
        .description { text-align: center; margin-bottom: 25px; font-size: 0.9em; color: #93a1a1; }

        .setup-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            background: #fdf6e3;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #b58900;
        }

        @media (max-width: 768px) {
            .setup-section { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label { font-weight: bold; color: #b58900; }

        input[type="file"] {
            border: 2px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #eee8d5;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .size-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .size-option {
            background: white;
            border: 2px solid #ddd;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: 0.2s;
        }

        .size-option.active {
            border-color: var(--accent-color);
            background: var(--accent-color);
            color: white;
        }

        .controls { text-align: center; margin-top: 20px; margin-bottom: 30px; }
        
        .btn-main {
            padding: 18px 60px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.3em;
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 6px 20px rgba(211, 54, 130, 0.3);
            transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-2px); background-color: #af2b69; }

        #preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
        }

        .preview-card {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #fdf6e3;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }

        .preview-card img { width: 100%; height: auto; display: block; }
        
        .download-btn {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 22px; text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .download-btn:hover { background: #fff; transform: scale(1.1); }

        .watermark {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(255,255,255,0.8);
            font-size: 11px;
            font-family: sans-serif;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>メッセージカード・メーカー</h1>
    <p class="description">好きな画像を背景にして、インスタや投稿用カードを作ろう</p>

    <div class="setup-section">
        <div class="input-group">
            <label>1. 背景画像を選択</label>
            <input type="file" id="bg-input" accept="image/*">
            <small>※写真を選ぶと、下のサイズに合わせて調整されます</small>
            
            <label style="margin-top:15px;">2. サイズを選択</label>
            <div class="size-selector" id="size-selector">
                <div class="size-option active" data-ratio="auto">おまかせ</div>
                <div class="size-option" data-ratio="1:1">正方形 (1:1)</div>
                <div class="size-option" data-ratio="4:5">インスタ投稿 (4:5)</div>
                <div class="size-option" data-ratio="9:16">ストーリーズ (9:16)</div>
                <div class="size-option" data-ratio="16:9">X (16:9)</div>
            </div>

            <label style="margin-top:15px;">4. 写真の大きさ</label>
            <input type="range" id="zoom-input" min="0.5" max="1.0" step="0.05" value="1.0" style="width:100%; accent-color: var(--accent-color);">
            <div style="text-align:right; font-size:0.8em; color: #93a1a1;"><span id="zoom-value">100</span>%</div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <div class="input-group">
                    <label>5. 文字の色</label>
                    <select id="text-color-input" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
                        <option value="#ffffff">白 (White)</option>
                        <option value="#000000">黒 (Black)</option>
                        <option value="#D4AF37">金 (Gold)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>6. 文字の位置</label>
                    <select id="text-position-input" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
                        <option value="center">中央</option>
                        <option value="top">上部</option>
                        <option value="bottom">下部</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="input-group">
            <label>3. メッセージを入力</label>
            <textarea id="text-input" placeholder="ここにメッセージを入力してください。
空行（エンター2回）を入れると別のカードに分かれます。
改行はそのまま画像に反映されます。"></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="btn-main" onclick="generateCards()">カードを生成する</button>
    </div>

    <div id="preview-container"></div>
</div>

<canvas id="worker-canvas" style="display:none;"></canvas>

<script>
    let userBgImage = null;
    let selectedRatio = 'auto';

    // サイズ選択の処理
    document.getElementById('size-selector').addEventListener('click', function(e) {
        if (e.target.classList.contains('size-option')) {
            document.querySelectorAll('.size-option').forEach(opt => opt.classList.remove('active'));
            e.target.classList.add('active');
            selectedRatio = e.target.dataset.ratio;
        }
    });

    // 画像が選ばれた時の処理
    document.getElementById('bg-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                userBgImage = img;
                alert('背景画像を読み込みました！');
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // ズームスライダーの値表示
    document.getElementById('zoom-input').addEventListener('input', function(e) {
        document.getElementById('zoom-value').innerText = Math.round(e.target.value * 100);
    });

    function generateCards() {
        const text = document.getElementById('text-input').value;
        const container = document.getElementById('preview-container');
        const canvas = document.getElementById('worker-canvas');
        const ctx = canvas.getContext('2d');
        const zoomFactor = parseFloat(document.getElementById('zoom-input').value);
        
        if (!text.trim()) {
            alert('メッセージを入力してください');
            return;
        }

        container.innerHTML = '生成中...';

        const blocks = text.split(/\n\s*\n/).filter(b => b.trim() !== '');
        container.innerHTML = '';

        blocks.forEach((block, index) => {
            const blockText = block.trim();
            const lines = blockText.split('\n');
            
            // キャンバスサイズの設定
            let targetW = 1000;
            let targetH = 1000;

            if (selectedRatio === 'auto') {
                if (userBgImage) {
                    const ratio = userBgImage.width / userBgImage.height;
                    if (ratio > 1) { // 横長
                        targetW = 1200;
                        targetH = 1200 / ratio;
                    } else { // 縦長 or 正方形
                        targetH = 1200;
                        targetW = 1200 * ratio;
                    }
                } else {
                    targetW = 1000; targetH = 1000; // デフォルト正方形
                }
            } else if (selectedRatio === '1:1') {
                targetW = 1080; targetH = 1080;
            } else if (selectedRatio === '4:5') {
                targetW = 1080; targetH = 1350;
            } else if (selectedRatio === '9:16') {
                targetW = 1080; targetH = 1920;
            } else if (selectedRatio === '16:9') {
                targetW = 1200; targetH = 675;
            }

            canvas.width = targetW;
            canvas.height = targetH;
            
            ctx.clearRect(0, 0, targetW, targetH);
            
            // 背景描画（スマートフィット機能）
            if (userBgImage) {
                const canvasRatio = targetW / targetH;
                const imgRatio = userBgImage.width / userBgImage.height;
                const ratioDiff = Math.abs(canvasRatio - imgRatio);

                // 比率がほぼ同じ（差が0.1以内）なら「カバー（切り抜き）」
                if (ratioDiff < 0.1) {
                    let sw, sh, sx, sy;
                    if (imgRatio > canvasRatio) {
                        sh = userBgImage.height;
                        sw = userBgImage.height * canvasRatio;
                        sx = (userBgImage.width - sw) / 2;
                        sy = 0;
                    } else {
                        sw = userBgImage.width;
                        sh = userBgImage.width / canvasRatio;
                        sx = 0;
                        sy = (userBgImage.height - sh) / 2;
                    }
                    ctx.drawImage(userBgImage, sx, sy, sw, sh, 0, 0, targetW, targetH);
                } 
                // 比率が違う場合は「ぼかし背景 + 中央配置」
                else {
                    // 1. 背景に大きくぼかして描画
                    ctx.save();
                    ctx.filter = 'blur(30px) brightness(0.7)';
                    ctx.drawImage(userBgImage, -50, -50, targetW + 100, targetH + 100);
                    ctx.restore();

                    // 2. 中央に全体が収まるように描画（コンテイン）+ 縮小
                    let dw, dh, dx, dy;
                    if (imgRatio > canvasRatio) {
                        dw = targetW * zoomFactor;
                        dh = (targetW / imgRatio) * zoomFactor;
                    } else {
                        dh = targetH * zoomFactor;
                        dw = (targetH * imgRatio) * zoomFactor;
                    }
                    dx = (targetW - dw) / 2;
                    dy = (targetH - dh) / 2;
                    ctx.drawImage(userBgImage, 0, 0, userBgImage.width, userBgImage.height, dx, dy, dw, dh);
                }
            } else {
                const g = ctx.createLinearGradient(0, 0, targetW, targetH);
                g.addColorStop(0, '#fff9f0'); g.addColorStop(1, '#ffe4e1');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, targetW, targetH);
            }

            // 文字を読みやすくするためのフィルター
            ctx.fillStyle = 'rgba(0, 0, 0, 0.35)'; // 少し濃いめに
            ctx.fillRect(0, 0, targetW, targetH);
            
            // 枠の装飾
            const margin = Math.min(targetW, targetH) * 0.06;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 4;
            ctx.strokeRect(margin, margin, targetW - margin * 2, targetH - margin * 2);

            // テキスト描画
            const textColor = document.getElementById('text-color-input').value;
            const textPos = document.getElementById('text-position-input').value;
            
            ctx.fillStyle = textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 影の設定（色に合わせて調整）
            if (textColor === '#ffffff') {
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = targetW * 0.015;
            } else if (textColor === '#D4AF37') { // 金
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = targetW * 0.01;
            } else {
                ctx.shadowColor = 'rgba(255,255,255,0.6)';
                ctx.shadowBlur = targetW * 0.015;
            }
            
            // フォントサイズ調整
            let baseFontSize = Math.min(targetW, targetH) * 0.06;
            if (blockText.length > 50) baseFontSize *= 0.8;
            if (blockText.length > 120) baseFontSize *= 0.6;
            
            ctx.font = `bold ${baseFontSize}px "Hiragino Mincho ProN", "YuMincho", serif`;
            
            const lineHeight = baseFontSize * 1.8;
            const totalHeight = lines.length * lineHeight;
            
            let startY;
            if (textPos === 'top') {
                startY = margin * 2.5 + (lineHeight / 2);
            } else if (textPos === 'bottom') {
                startY = targetH - (margin * 2.5) - totalHeight + (lineHeight / 2);
            } else {
                startY = targetH / 2 - (totalHeight / 2) + (lineHeight / 2);
            }

            lines.forEach((line, i) => {
                ctx.fillText(line, targetW / 2, startY + (i * lineHeight));
            });

            // プレビュー生成
            const dataUrl = canvas.toDataURL('image/png');
            const div = document.createElement('div');
            div.className = 'preview-card';
            div.innerHTML = `
                <img src="${dataUrl}">
                <div class="watermark">Heartful Family Message</div>
                <a href="${dataUrl}" download="message_card_${index+1}.png" class="download-btn" title="画像を保存">📥</a>
            `;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
