<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-LAB | Premium Flat T-Studio V14</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@300;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-deep: #08090a;
            --sidebar: rgba(15, 16, 18, 0.98);
            --border: rgba(255, 255, 255, 0.1);
            --transition: cubic-bezier(0.2, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 16px 40px;
            background: #000;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand h1 {
            font-size: 0.9rem;
            letter-spacing: 0.25em;
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
            color: #fff;
        }

        .v-tag {
            font-size: 8px;
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
            padding: 2px 8px;
            border-radius: 2px;
            margin-left: 12px;
            font-weight: 900;
        }

        .app-shell {
            display: grid;
            grid-template-columns: 310px 1fr 290px;
            flex: 1;
            overflow: hidden;
        }

        .side {
            background: var(--sidebar);
            padding: 30px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
        }

        .side-r {
            border-right: none;
            border-left: 1px solid var(--border);
        }

        .label-cap {
            color: var(--primary-gold);
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            margin-bottom: 25px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .label-cap::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(197, 160, 89, 0.15);
        }

        .workspace {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0b0c;
        }

        .tshirt-mockup {
            position: relative;
            width: 750px;
            height: 750px;
            filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.6));
        }

        .svg-mock {
            width: 100%;
            height: 100%;
        }

        #body-layer {
            fill: #ffffff;
            transition: fill 0.4s var(--transition);
        }

        .collar-line {
            fill: none;
            stroke: rgba(0, 0, 0, 0.06);
            stroke-width: 2.5;
        }

        .shade {
            mix-blend-mode: multiply;
            opacity: 0.04;
            pointer-events: none;
        }

        /* --- Logo Canvas --- */
        .logo-system {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .logo-unit {
            position: absolute;
            pointer-events: all;
            cursor: move;
            border: 1px dashed transparent;
        }

        .logo-unit img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .logo-unit:hover {
            border-color: var(--primary-gold);
        }

        .rs-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--primary-gold);
            border-radius: 50%;
            right: -7px;
            bottom: -7px;
            cursor: nwse-resize;
            display: none;
            border: 2px solid #000;
        }

        .logo-unit:hover .rs-dot {
            display: block;
        }

        /* --- Controls --- */
        .swatches {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .sw-btn {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .sw-btn.active {
            border-color: var(--primary-gold);
            transform: scale(1.1);
        }

        .btn-l {
            background: #1a1b1e;
            border: 1px solid var(--border);
            color: #888;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
            text-align: left;
            transition: 0.2s;
        }

        .btn-l:hover {
            color: #fff;
            background: #222326;
        }

        .btn-l.active {
            background: var(--primary-gold);
            color: #000;
            font-weight: 800;
            border-color: transparent;
        }

        .up-panel {
            border: 2.5px dashed #222;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            display: block;
        }

        .up-panel:hover {
            border-color: var(--primary-gold);
            background: rgba(197, 160, 89, 0.05);
        }

        .ctrl-g {
            margin-bottom: 22px;
        }

        .ctrl-g label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #555;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .ctrl-g span {
            color: var(--primary-gold);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-gold);
            height: 4px;
            appearance: none;
            background: #111;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            background: var(--primary-gold);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #000;
        }

        footer {
            padding: 25px;
            background: #000;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
        }

        .bt-save {
            padding: 14px 60px;
            border-radius: 4px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 14px;
            background: var(--primary-gold);
            color: #000;
            transition: 0.3s;
            letter-spacing: 0.1em;
        }

        .bt-save:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Notification */
        #notif {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-50px);
            opacity: 0;
            background: var(--primary-gold);
            color: #000;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 12px;
            transition: 0.5s var(--transition);
            z-index: 1000;
            pointer-events: none;
        }

        #notif.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">
            <h1>M-LAB PREMIUM T-STUDIO</h1>
            <span class="v-tag">PREMIUM FLAT V14.0</span>
        </div>
    </header>

    <div class="app-shell">
        <div class="side">
            <div class="label-cap">Chassis Selection</div>
            <div class="swatches">
                <button class="sw-btn active" style="background:#ffffff" onclick="uC('#ffffff', this)"></button>
                <button class="sw-btn" style="background:#0a0a0b" onclick="uC('#0a0a0b', this)"></button>
                <button class="sw-btn" style="background:#203150" onclick="uC('#203150', this)"></button>
                <button class="sw-btn" style="background:#404041" onclick="uC('#404041', this)"></button>
                <button class="sw-btn" style="background:#777779" onclick="uC('#777779', this)"></button>
                <button class="sw-btn" style="background:#ffdbdb" onclick="uC('#ffdbdb', this)"></button>
                <button class="sw-btn" style="background:#fff4ce" onclick="uC('#fff4ce', this)"></button>
                <button class="sw-btn" style="background:#caeaff" onclick="uC('#caeaff', this)"></button>
                <button class="sw-btn" style="background:#4b1a1a" onclick="uC('#4b1a1a', this)"></button>
                <button class="sw-btn" style="background:#1d4d38" onclick="uC('#1d4d38', this)"></button>
            </div>

            <div class="label-cap">Placement Presets</div>
            <button class="btn-l active" onclick="uL('c', this)">胸中央 (Center)</button>
            <button class="btn-l" onclick="uL('l', this)">左胸 (Pocket)</button>
            <button class="btn-l" onclick="uL('b', this)">背面 (Large Back)</button>
            <button class="btn-l" onclick="uL('s', this)">左袖 (Sleeve)</button>

            <label class="up-panel" for="f-up">
                <span style="font-size:24px">📂</span><br>
                <span
                    style="font-size:10px; font-weight:900; color:#555; margin-top:10px; display:block;">LOGO画像をアップロード</span>
                <input type="file" id="f-up" style="display:none" onchange="hL(event)">
            </label>

            <div class="label-cap" style="margin-top:30px;">Official Symbols</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-l" style="height:auto; padding:10px; text-align:center;"
                    onclick="uS('mlab_wand_icon.png')">
                    <img src="mlab_wand_icon.png"
                        style="width:40px; height:40px; object-fit:contain; filter: brightness(0) invert(1);"><br>
                    <span style="font-size:9px;">Magic Wand</span>
                </button>
            </div>
        </div>

        <div class="workspace">
            <div class="tshirt-mockup">
                <svg class="svg-mock" viewBox="0 0 1000 1000">
                    <defs>
                        <linearGradient id="softLighting" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:white;stop-opacity:0.2" />
                            <stop offset="100%" style="stop-color:black;stop-opacity:0.05" />
                        </linearGradient>
                    </defs>

                    <!-- 👕 Premium Flat Silhouette - Clean & Solid -->
                    <g id="tshirt-base">
                        <!-- The Main Path -->
                        <path id="body-layer"
                            d="M500,220 C430,220 380,240 350,270 L220,320 L120,560 L260,620 L330,480 L330,950 C330,980 415,1000 500,1000 S670,980 670,950 L670,480 L740,620 L880,560 L780,320 L650,270 C620,240 570,220 500,220 Z" />

                        <!-- Clean Lighting Overlay -->
                        <path fill="url(#softLighting)" pointer-events="none"
                            d="M500,220 C430,220 380,240 350,270 L220,320 L120,560 L260,620 L330,480 L330,950 C330,980 415,1000 500,1000 S670,980 670,950 L670,480 L740,620 L880,560 L780,320 L650,270 C620,240 570,220 500,220 Z" />

                        <!-- Collar Detail -->
                        <path class="collar-line" d="M350,270 C350,330 420,360 500,360 S650,330 650,270" />

                        <!-- Subtle Interior Shadow -->
                        <path class="shade" d="M350,950 C350,980 415,1000 500,1000 S670,980 670,950" />
                    </g>
                </svg>
                <div class="logo-system">
                    <div class="logo-unit" id="l-node"
                        style="width:180px; left:50%; top:50%; transform:translate(-50%, -50%)">
                        <img id="l-img" src="" style="display:none">
                        <div class="rs-dot" id="rs-dot"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="side side-r">
            <div class="label-cap">Fine Calibration</div>
            <div class="ctrl-g">
                <label>Scale (サイズ) <span id="v-s">180px</span></label>
                <input type="range" id="rg-s" min="20" max="600" value="180" oninput="uD()">
            </div>
            <div class="ctrl-g">
                <label>Opacity (透明度) <span id="v-o">100%</span></label>
                <input type="range" id="rg-o" min="0" max="1" step="0.01" value="1" oninput="uD()">
            </div>
            <div class="ctrl-g">
                <label>Rotation (回転) <span id="v-r">0°</span></label>
                <input type="range" id="rg-r" min="-180" max="180" value="0" oninput="uD()">
            </div>

            <div class="ctrl-g" style="margin-top:25px;">
                <label>Blend Logic</label>
                <select id="l-blend" onchange="uD()"
                    style="width:100%; background:#111; color:#fff; border:1px solid var(--border); padding:10px; border-radius:8px; font-size:12px;">
                    <option value="multiply" selected>生地に馴染ませる (推奨)</option>
                    <option value="normal">そのまま表示 (Normal)</option>
                </select>
            </div>

            <div
                style="margin-top:40px; padding:20px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--border);">
                <p style="font-size:11px; color:#444; line-height:1.7; margin:0;">
                    👔 <b>Premium Flat V14.0:</b><br>
                    「一目でわかる」ことを追求した黄金比のシルエット。平面的ながら洗練された美しさを提供します。
                </p>
            </div>
        </div>
    </div>

    <div id="notif">デザインを確定・保存しました</div>

    <footer>
        <button class="bt-save" onclick="saveDesign()">デザインを確定・保存</button>
    </footer>

    <script>
        const node = document.getElementById('l-node');
        const img = document.getElementById('l-img');
        const dot = document.getElementById('rs-dot');
        let isD = false, isR = false, ox, oy;

        function uC(c, el) {
            document.getElementById('body-layer').style.fill = c;
            document.querySelectorAll('.sw-btn').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        function uL(l, el) {
            document.querySelectorAll('.btn-l').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            node.style.transition = "all 0.5s var(--transition)";

            switch (l) {
                case 'c': // Center
                    node.style.left = "50%"; node.style.top = "55%";
                    document.getElementById('rg-s').value = 240;
                    break;
                case 'l': // Left Chest
                    node.style.left = "42%"; node.style.top = "46%";
                    document.getElementById('rg-s').value = 110;
                    break;
                case 'b': // Back
                    node.style.left = "50%"; node.style.top = "60%";
                    document.getElementById('rg-s').value = 400;
                    break;
                case 's': // Left Sleeve
                    node.style.left = "20%"; node.style.top = "50%";
                    document.getElementById('rg-s').value = 90;
                    break;
            }
            uD();
            setTimeout(() => node.style.transition = "none", 500);
        }

        function hL(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ae) => {
                img.src = ae.target.result; img.style.display = 'block';
                node.style.left = "50%"; node.style.top = "55%";
                uD();
            };
            reader.readAsDataURL(file);
        }

        function uS(path) {
            img.src = path;
            img.style.display = 'block';
            node.style.left = "50%";
            node.style.top = "55%";
            uD();
        }

        function uD() {
            const s = document.getElementById('rg-s').value;
            const o = document.getElementById('rg-o').value;
            const r = document.getElementById('rg-r').value;
            const blend = document.getElementById('l-blend').value;

            node.style.width = s + 'px';
            img.style.opacity = o;
            node.style.mixBlendMode = blend;
            node.style.transform = `translate(-50%, -50%) rotate(${r}deg)`;

            document.getElementById('v-s').innerText = s + 'px';
            document.getElementById('v-o').innerText = Math.round(o * 100) + '%';
            document.getElementById('v-r').innerText = r + '°';
        }

        node.onmousedown = (e) => {
            if (e.target === dot) return;
            isD = true;
            const rect = node.getBoundingClientRect();
            const offsetX = e.clientX - rect.left - rect.width / 2;
            const offsetY = e.clientY - rect.top - rect.height / 2;

            document.onmousemove = (me) => {
                if (!isD) return;
                const pRect = document.querySelector('.tshirt-mockup').getBoundingClientRect();
                node.style.left = (me.clientX - pRect.left - offsetX) + 'px';
                node.style.top = (me.clientY - pRect.top - offsetY) + 'px';
            };
            document.onmouseup = () => { isD = false; document.onmousemove = null; };
        };

        dot.onmousedown = (e) => {
            isR = true; e.preventDefault();
            const sX = e.clientX, sW = parseInt(getComputedStyle(node).width);
            document.onmousemove = (me) => {
                if (!isR) return;
                const newW = sW + (me.clientX - sX) * 2;
                if (newW > 20) {
                    node.style.width = newW + 'px';
                    document.getElementById('rg-s').value = newW;
                    uD();
                }
            };
            document.onmouseup = () => { isR = false; document.onmousemove = null; };
        };

        function saveDesign() {
            const n = document.getElementById('notif');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3000);
        }
    </script>
</body>

</html>
