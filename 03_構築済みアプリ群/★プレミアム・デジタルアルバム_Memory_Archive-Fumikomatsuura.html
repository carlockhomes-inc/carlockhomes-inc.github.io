<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-LAB | Premium Memory Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --gold-dark: #a67c37;
            --bg: #0a0b0e;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
            --text-dim: #888;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(197, 160, 89, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(197, 160, 89, 0.03) 0%, transparent 40%);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
        }

        /* --- Header --- */
        header {
            padding: 60px 20px 40px;
            text-align: center;
        }

        .logo-area h1 {
            font-family: 'Noto Serif JP', serif;
            font-size: 2.8rem;
            letter-spacing: 0.15em;
            margin: 0;
            background: linear-gradient(to bottom, #fdfcfb 0%, #e2d1c3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: var(--gold);
            letter-spacing: 0.4em;
            font-size: 0.8rem;
            font-weight: 700;
            margin: 10px 0 0;
            text-transform: uppercase;
        }

        /* --- controls --- */
        .main-controls {
            max-width: 1200px;
            margin: 0 auto 40px;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .drop-zone {
            width: 100%;
            height: 150px;
            border: 2px dashed var(--gold);
            border-radius: 20px;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .drop-zone:hover {
            background: rgba(197, 160, 89, 0.1);
            border-color: #fff;
        }

        .drop-zone i { font-size: 2rem; margin-bottom: 10px; color: var(--gold); }
        .drop-zone span { font-weight: 600; font-size: 0.9rem; opacity: 0.8; }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 10px 0;
            width: 100%;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3);
        }

        /* --- Gallery --- */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 200px;
            grid-auto-flow: dense;
            gap: 20px;
        }

        .photo-card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #111;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-color: var(--gold);
            z-index: 10;
        }

        .photo-card.span-w { grid-column: span 2; }
        .photo-card.span-h { grid-row: span 2; }

        .card-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            opacity: 0;
            transform: translateY(20px);
        }

        .photo-card:hover .card-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .card-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 5px;
            background: var(--gold);
            color: #000;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0;
            color: #fff;
        }

        /* --- Lightbox --- */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: none;
            z-index: 1000;
            padding: 40px;
            justify-content: center;
            align-items: center;
        }

        .lightbox-content {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            height: 100%;
        }

        .lightbox-img-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            overflow: hidden;
        }

        .lightbox-img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .lightbox-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .lb-title-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--gold);
            color: #fff;
            font-size: 1.5rem;
            font-family: 'Noto Serif JP', serif;
            padding: 10px 0;
            width: 100%;
        }

        .lb-desc-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 15px;
            height: 200px;
            resize: none;
            font-family: inherit;
        }

        .lb-tag-select {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag-pill {
            padding: 6px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .tag-pill.active {
            background: var(--gold);
            color: #000;
            font-weight: bold;
        }

        .btn-close {
            position: absolute;
            top: 30px; right: 30px;
            background: none; border: none; color: #fff;
            font-size: 2rem; cursor: pointer;
        }

        /* --- Floating Action Button --- */
        .fab-container {
            position: fixed;
            bottom: 40px; right: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .fab {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: var(--gold);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.4);
        }

        .fab:hover { transform: scale(1.1); }
        .fab-label { position: absolute; right: 75px; white-space: nowrap; background: #222; padding: 5px 15px; border-radius: 5px; font-size: 0.8rem; opacity: 0; pointer-events: none; }
        .fab:hover .fab-label { opacity: 1; }

        @media (max-width: 900px) {
            .lightbox-content { grid-template-columns: 1fr; overflow-y: auto; }
            .lightbox-info { height: auto; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>MEMORY ARCHIVE</h1>
            <p>M-LAB Visual Producer</p>
        </div>
    </header>

    <div class="main-controls">
        <label for="file-upload" class="drop-zone" id="drop-zone">
            <span>ファイルをドロップ、またはクリックして追加</span>
            <span style="font-size: 0.7rem; opacity: 0.6; margin-top: 10px;">(写真はブラウザ内でのみ処理されます)</span>
            <input type="file" id="file-upload" multiple accept="image/*" style="display:none">
        </label>

        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" onclick="filterGallery('all')">すべて</button>
            <button class="filter-btn" onclick="filterGallery('学校')">学校</button>
            <button class="filter-btn" onclick="filterGallery('eスポーツ')">eスポーツ</button>
            <button class="filter-btn" onclick="filterGallery('家族')">家族</button>
            <button class="filter-btn" onclick="filterGallery('旅行')">旅行</button>
            <button class="filter-btn" onclick="filterGallery('未整理')">未整理</button>
        </div>
    </div>

    <main class="gallery-container">
        <div class="gallery-grid" id="gallery-grid">
            <!-- Photos mapped here -->
        </div>
    </main>

    <!-- Lightbox -->
    <div id="lightbox">
        <button class="btn-close" onclick="closeLightbox()">&times;</button>
        <div class="lightbox-content">
            <div class="lightbox-img-box">
                <img id="lb-img" src="" alt="">
            </div>
            <div class="lightbox-info">
                <input type="text" id="lb-title" class="lb-title-input" placeholder="タイトルを入力...">
                <p id="lb-date" style="color: var(--gold); font-size: 0.8rem; margin: 0; font-weight: bold;"></p>
                <textarea id="lb-desc" class="lb-desc-input" placeholder="この写真の思い出を書き留めてください..."></textarea>
                
                <div style="font-size: 0.8rem; font-weight: bold; color: var(--gold); margin-top: 10px;">カテゴリー（タグ）</div>
                <div class="lb-tag-select" id="lb-tags">
                    <!-- Tags generated here -->
                </div>
                
                <div style="margin-top: auto; display: flex; gap: 10px;">
                    <button onclick="saveCurrentPhoto()" style="flex: 1; padding: 15px; border-radius: 10px; border: none; background: var(--gold); color: #000; font-weight: 700; cursor: pointer;">保存</button>
                    <button onclick="deleteCurrentPhoto()" style="padding: 15px; border-radius: 10px; border: 1px solid #ff4444; background: transparent; color: #ff4444; cursor: pointer;">削除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Actions -->
    <div class="fab-container">
        <div class="fab" onclick="exportData()" title="データを保存">
            <span>💾</span>
            <div class="fab-label">現在の整理状態を保存</div>
        </div>
        <div class="fab" onclick="importData()" title="データを読み込み">
            <span>📂</span>
            <div class="fab-label">保存したデータを読み込む</div>
        </div>
        <div class="fab" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <span>↑</span>
        </div>
    </div>

    <script>
        let photos = [];
        let currentPhotoId = null;
        let activeFilter = 'all';
        const tags = ['学校', 'eスポーツ', '家族', '旅行', 'その他'];

        // --- Core Functions ---

        // Drop Zone
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = "#fff"; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = "var(--gold)"; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "var(--gold)";
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(files) {
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const id = Date.now() + Math.random().toString(36).substr(2, 9);
                    const photo = {
                        id: id,
                        src: e.target.result,
                        name: file.name,
                        title: file.name.split('.')[0],
                        date: new Date(file.lastModified).toLocaleDateString('ja-JP'),
                        desc: '',
                        tags: ['未整理'],
                        aspect: 'square'
                    };
                    
                    // Determine aspect ratio for masonry
                    const img = new Image();
                    img.onload = () => {
                        const ratio = img.width / img.height;
                        if (ratio > 1.5) photo.aspect = 'wide';
                        else if (ratio < 0.7) photo.aspect = 'tall';
                        photos.push(photo);
                        renderGallery();
                        autoSave();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            
            const filtered = activeFilter === 'all' 
                ? photos 
                : photos.filter(p => p.tags.includes(activeFilter));

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; opacity: 0.5;">写真がありません。ドラッグ＆ドロップで追加してください。</div>';
                return;
            }

            filtered.forEach(photo => {
                const card = document.createElement('div');
                card.className = `photo-card ${photo.aspect === 'wide' ? 'span-w' : (photo.aspect === 'tall' ? 'span-h' : '')}`;
                card.innerHTML = `
                    <img src="${photo.src}" alt="${photo.title}">
                    <div class="card-overlay">
                        <span class="card-tag">${photo.tags[0]}</span>
                        <p class="card-title">${photo.title}</p>
                    </div>
                `;
                card.onclick = () => openLightbox(photo.id);
                grid.appendChild(card);
            });
        }

        function filterGallery(tag) {
            activeFilter = tag;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === tag || (tag === 'all' && btn.innerText === 'すべて'));
            });
            renderGallery();
        }

        // --- Lightbox ---
        function openLightbox(id) {
            const photo = photos.find(p => p.id === id);
            if (!photo) return;
            currentPhotoId = id;
            
            document.getElementById('lb-img').src = photo.src;
            document.getElementById('lb-title').value = photo.title;
            document.getElementById('lb-date').innerText = photo.date;
            document.getElementById('lb-desc').value = photo.desc;
            
            const tagContainer = document.getElementById('lb-tags');
            tagContainer.innerHTML = '';
            tags.concat(['未整理']).forEach(t => {
                const pill = document.createElement('div');
                pill.className = `tag-pill ${photo.tags.includes(t) ? 'active' : ''}`;
                pill.innerText = t;
                pill.onclick = () => toggleTag(t);
                tagContainer.appendChild(pill);
            });

            document.getElementById('lightbox').style.display = 'flex';
        }

        function toggleTag(tag) {
            const photo = photos.find(p => p.id === currentPhotoId);
            if (photo.tags.includes(tag)) {
                if (photo.tags.length > 1) photo.tags = photo.tags.filter(t => t !== tag);
            } else {
                if (tag === '未整理') photo.tags = ['未整理'];
                else {
                    photo.tags = photo.tags.filter(t => t !== '未整理');
                    photo.tags.push(tag);
                }
            }
            openLightbox(currentPhotoId); // refresh
        }

        function saveCurrentPhoto() {
            const photo = photos.find(p => p.id === currentPhotoId);
            photo.title = document.getElementById('lb-title').value;
            photo.desc = document.getElementById('lb-desc').value;
            closeLightbox();
            renderGallery();
            autoSave();
        }

        function deleteCurrentPhoto() {
            if (confirm('この写真を削除しますか？')) {
                photos = photos.filter(p => p.id !== currentPhotoId);
                closeLightbox();
                renderGallery();
                autoSave();
            }
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        // --- Persistence ---
        function autoSave() {
            // Limited by localStorage size (usually 5MB), so we mainly save metadata if src is large.
            // For this local tool, we recommend the 'Export' function for many photos.
            const metadata = photos.map(p => ({ ...p, src: p.src.length > 100000 ? 'blob' : p.src }));
            localStorage.setItem('mlab_archive_meta', JSON.stringify(metadata));
        }

        function exportData() {
            const data = JSON.stringify(photos);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Memories_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (re) => {
                    try {
                        const imported = JSON.parse(re.target.result);
                        photos = imported;
                        renderGallery();
                        alert('データを読み込みました。');
                    } catch (err) {
                        alert('エラー: 正しい形式のファイルではありません。');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Load existing if potential
        window.onload = () => {
            const saved = localStorage.getItem('mlab_archive_meta');
            // Note: Since photos are large base64, localStorage isn't ideal for long-term.
            // We encourage the Export/Import workflow.
        };

    </script>
</body>
</html>
