<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Card Maker Premium Pro | M-Lab</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;700&family=Kaisei+Opti:wght@700&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-gold: #a67c37;
            --bg-dark: #0f1115;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-light: #e0e0e0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at top right, #1a1c23, #0f1115);
            color: var(--text-light);
            margin: 0; padding: 40px 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .premium-header { text-align: center; margin-bottom: 40px; }
        .premium-header h1 {
            font-family: 'Noto Serif JP', serif; font-size: 2.5em; letter-spacing: 0.1em;
            background: linear-gradient(to bottom, #fdfcfb 0%, #e2d1c3 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .premium-header p { color: var(--primary-gold); letter-spacing: 0.2em; font-size: 0.8em; margin: 5px 0; }

        .container {
            max-width: 900px; width: 100%; background: var(--card-glass); backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass); border-radius: 30px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); box-sizing: border-box;
        }

        /* 💡 Workflow Order: Background -> Size -> Text -> Details */
        .step-section { margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid var(--border-glass); }
        .step-section:last-of-type { border-bottom: none; margin-bottom: 20px; }
        
        .step-label { color: var(--primary-gold); font-weight: 700; font-size: 1.1em; letter-spacing: 0.1em; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .step-label span { background: var(--primary-gold); color: black; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 16px; min-width: 28px; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group label { font-size: 0.85em; opacity: 0.8; font-weight: 600; }

        .setting-input {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass);
            border-radius: 12px; padding: 14px; color: white; font-size: 15px; width: 100%; box-sizing: border-box; transition: 0.3s;
        }

        textarea {
            width: 100%; height: 160px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass);
            border-radius: 15px; padding: 20px; color: white; font-size: 18px; resize: none; box-sizing: border-box; line-height: 1.6;
        }

        .styling-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; margin-top: 20px; }
        .color-picker-box { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border-glass); }
        .color-input { width: 34px; height: 34px; border: none; background: none; cursor: pointer; padding: 0; }

        .btn-generate {
            background: linear-gradient(135deg, var(--primary-gold), var(--dark-gold));
            color: #000; border: none; padding: 20px 80px; border-radius: 60px;
            font-weight: 700; font-size: 1.3em; cursor: pointer; transition: 0.3s;
            display: block; margin: 40px auto; box-shadow: 0 10px 30px rgba(166, 124, 55, 0.4);
        }
        .btn-generate:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 15px 40px rgba(166, 124, 55, 0.6); }

        /* -------------------------------------
           Preview Grid
        ------------------------------------- */
        .preview-area { width: 100%; margin-top: 60px; }
        .section-title { font-family: 'Noto Serif JP', serif; font-size: 1.5em; text-align: center; color: var(--primary-gold); margin-bottom: 20px; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }

        .card-item { 
            position: relative; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); border: 1px solid var(--border-glass); 
            background: #000; transition: 0.3s;
        }
        .card-item img { width: 100%; display: block; object-fit: cover; }
        
        .card-actions { 
            background: #111; padding: 20px; display: flex; flex-direction: column; gap: 12px; 
            border-top: 1px solid var(--border-glass);
        }

        .btn-save { 
            width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 700; 
            text-align: center; border: none; cursor: pointer; transition: 0.2s; 
        }
        .btn-png { background: white; color: black; box-shadow: 0 4px 0 #ccc; }
        .btn-png:hover { background: var(--primary-gold); transform: translateY(2px); box-shadow: 0 2px 0 #a67c37; }
        .btn-jpg { background: #333; color: white; border: 1px solid var(--primary-gold); box-shadow: 0 4px 0 #1a1a1a; }
        .btn-jpg:hover { transform: translateY(2px); box-shadow: 0 2px 0 #000; }

        .dl-tip { 
            background: rgba(197, 160, 89, 0.1); border: 1px dashed var(--primary-gold);
            padding: 15px; border-radius: 15px; color: var(--primary-gold); 
            font-size: 13px; text-align: center; margin: 20px 0; font-weight: bold; line-height: 1.6;
        }
    </style>
</head>
<body>

<header class="premium-header">
    <h1>Message Card Maker</h1>
    <p>Premium Pro Flow | Stable Perfection</p>
</header>

<div class="container">
    
    <!-- STEP 01: 背景の選択 -->
    <div class="step-section">
        <div class="step-label"><span>1</span> BACKGROUND SELECT</div>
        <div class="form-grid">
            <div class="input-group">
                <label>自分の写真を使う</label>
                <input type="file" id="bg-input" accept="image/*" class="setting-input">
            </div>
            <div class="input-group">
                <label>高品質テーマから選ぶ</label>
                <select id="bg-preset" class="setting-input">
                    <option value="none">-- 選択してください --</option>
                    <option value="dark">漆黒 (Standard Dark)</option>
                    <option value="marble">高級大理石 (White Marble)</option>
                    <option value="silk">ラグジュアリーシルク (Beige Silk)</option>
                    <option value="gold">金箔テクスチャ (Gold Foil)</option>
                    <option value="paper">上質な和紙 (Premium Washi)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- STEP 02: サイズの選択 -->
    <div class="step-section">
        <div class="step-label"><span>2</span> CANVAS SIZE</div>
        <div class="input-group">
            <label>目的のSNSサイズに合わせてサイズを選択</label>
            <select id="size-select" class="setting-input">
                <option value="1:1">正方形 (1:1) - Instagram投稿</option>
                <option value="9:16">縦長 (9:16) - ストーリーズ / リール</option>
                <option value="16:9">横長 (16:9) - X / Youtube</option>
            </select>
        </div>
    </div>

    <!-- STEP 03: メッセージ入力 -->
    <div class="step-section">
        <div class="step-label"><span>3</span> MESSAGE CONTENT</div>
        <div class="input-group">
            <label>メッセージを記入（1行あけると、自動で2枚目のカードを作ります）</label>
            <textarea id="text-input" placeholder="ここにメッセージを入力..."></textarea>
        </div>
    </div>

    <!-- STEP 04: デザイン詳細設定 -->
    <div class="step-section">
        <div class="step-label"><span>4</span> DETAILED STYLING</div>
        
        <div class="styling-grid">
            <div class="input-group">
                <label>カラーカスタマイズ</label>
                <div style="display:flex; gap:12px;">
                    <div class="color-picker-box">
                        <span style="font-size:10px; font-weight:bold;">文字色</span>
                        <input type="color" id="text-color" value="#ffffff" class="color-input">
                    </div>
                    <div class="color-picker-box">
                        <span style="font-size:10px; font-weight:bold;">枠線の色</span>
                        <input type="color" id="frame-color" value="#c5a059" class="color-input">
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>フォントの選択</label>
                <select id="font-select" class="setting-input">
                    <option value="'Noto Serif JP', serif">明朝体 (Elegant)</option>
                    <option value="'Noto Sans JP', sans-serif">ゴシック (Modern)</option>
                    <option value="'Kaisei Opti', serif">装飾字体 (Kaisei)</option>
                    <option value="'Yuji Syuku', serif">筆文字風 (Yuji)</option>
                </select>
            </div>

            <div class="input-group">
                <label>ブランド署名 (右下)</label>
                <input type="text" id="brand-input" class="setting-input" value="M-LAB PREMIUM">
            </div>
        </div>

        <div class="styling-grid">
            <div class="input-group">
                <label>文字の大きさ</label>
                <input type="range" id="font-size-range" min="0.5" max="3.0" step="0.1" value="1.0">
            </div>
            <div class="input-group">
                <label>枠線の太さ (0〜100)</label>
                <input type="range" id="frame-thickness-range" min="0" max="100" step="1" value="20">
            </div>
            <div class="input-group">
                <label>背景の明暗 (コントラスト)</label>
                <input type="range" id="overlay-range" min="0" max="0.95" step="0.05" value="0.4">
            </div>
        </div>
    </div>

    <button class="btn-generate" onclick="generateCards()">カードを生成する</button>

</div>

<div class="preview-area">
    <div class="section-title">✨ PREVIEW (現在編集中のカード)</div>
    <div id="dl-tip" class="dl-tip">
        💡 「名前を付けて保存」を押すと、保存と同時に下の<b>「My Collection」</b>に残ります！
    </div>
    <div id="preview-grid" class="preview-grid"></div>
</div>

<!-- 🌟 NEW: 保存済みコレクション・エリア -->
<div class="preview-area" style="margin-top: 80px; border-top: 2px solid var(--primary-gold); padding-top: 40px;">
    <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px;">
        <div class="section-title" style="margin-bottom:0;">🏆 My Collection (保存済み)</div>
        <button onclick="clearCollection()" style="background: rgba(255,0,0,0.2); color: #ff6b6b; border: 1px solid #ff6b6b; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;">コレクションをクリア</button>
    </div>
    <div id="collection-grid" class="preview-grid">
        <!-- ここに保存したものが溜まっていく -->
    </div>
</div>

<canvas id="worker-canvas" style="display:none;"></canvas>

<script>
    const presets = {
        marble: 'https://images.unsplash.com/photo-1542283938-238248373393?q=80&w=1200&auto=format&fit=crop',
        silk: 'https://images.unsplash.com/photo-1549490349-8643362247b5?q=80&w=1200&auto=format&fit=crop',
        gold: 'https://images.unsplash.com/photo-1502220389384-75496525977a?q=80&w=1200&auto=format&fit=crop',
        paper: 'https://images.unsplash.com/photo-1598918239080-87a3875a6104?q=80&w=1200&auto=format&fit=crop'
    };

    let userBgImage = null;
    let presetImage = null;

    document.getElementById('bg-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { 
            const img = new Image(); 
            img.onload = () => { 
                userBgImage = img; 
                presetImage = null; // テーマをクリア
                document.getElementById('bg-preset').value = 'none';
                generateCards(); 
            }; 
            img.src = ev.target.result; 
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('bg-preset').onchange = (e) => {
        userBgImage = null; // 自分画像をクリア
        document.getElementById('bg-input').value = ''; // ファイル選択もクリア
        
        if(e.target.value==='none'||e.target.value==='dark'){ 
            presetImage = null; 
            generateCards(); 
            return; 
        }
        const img = new Image(); 
        img.crossOrigin = "anonymous"; 
        img.onload = () => { 
            presetImage = img; 
            generateCards(); 
        };
        img.src = presets[e.target.value] + "?cb=" + Date.now();
    };

    // 保存しつつ、画面に残す (コレクションに追加)
    function addToCollection(canvas, type) {
        const grid = document.getElementById('collection-grid');
        const wrapper = document.createElement('div');
        wrapper.className = 'card-item';
        // 縦長対応
        if(canvas.height > canvas.width) wrapper.style.gridRow="span 2";

        const img = document.createElement('img');
        img.src = canvas.toDataURL(type === 'jpg' ? 'image/jpeg' : 'image/png');
        
        const info = document.createElement('div');
        info.style = "background: #1a1a1a; padding: 10px; font-size: 11px; text-align: center; color: var(--primary-gold); font-weight: bold;";
        info.innerText = `SAVED (${type.toUpperCase()}) - ${new Date().toLocaleTimeString()}`;

        wrapper.appendChild(img);
        wrapper.appendChild(info);
        grid.prepend(wrapper); // 最新を前に
    }

    function clearCollection() {
        if(confirm('コレクションをすべて削除しますか？')) {
            document.getElementById('collection-grid').innerHTML = '';
        }
    }

    // 最も確実な「名前を付けて保存」機能 (場所を選べる)
    async function superSave(canvas, filename, type) {
        const mimeType = type === 'jpg' ? 'image/jpeg' : 'image/png';
        const fileSuffix = type === 'jpg' ? '.jpg' : '.png';
        const finalName = filename + fileSuffix;

        // 保存と同時にコレクションに追加
        addToCollection(canvas, type);

        try {
            if (window.showSaveFilePicker) {
                const handle = await window.showSaveFilePicker({
                    suggestedName: finalName,
                    types: [{ description: type.toUpperCase() + ' Image', accept: { [mimeType]: [fileSuffix] } }],
                });
                const blob = await new Promise(res => canvas.toBlob(res, mimeType, type === 'jpg' ? 0.9 : 1.0));
                const writable = await handle.createWritable();
                await writable.write(blob);
                await writable.close();
                return;
            }
        } catch (e) { 
            if (e.name === 'AbortError') return; 
            console.warn('Modern save picker restricted, using fallback.');
        }

        canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = finalName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }, mimeType, type === 'jpg' ? 0.9 : 1.0);
    }

    function generateCards() {
        const text = document.getElementById('text-input').value;
        const brandName = document.getElementById('brand-input').value || 'M-LAB';
        const overlay = document.getElementById('overlay-range').value;
        const font = document.getElementById('font-select').value;
        const sizeScale = parseFloat(document.getElementById('font-size-range').value);
        const frameT = parseFloat(document.getElementById('frame-thickness-range').value);
        const ratio = document.getElementById('size-select').value;
        const textColor = document.getElementById('text-color').value;
        const frameColor = document.getElementById('frame-color').value;

        const container = document.getElementById('preview-grid');
        const worker = document.getElementById('worker-canvas');
        const ctx = worker.getContext('2d');
        
        if (!text.trim()) { container.innerHTML=''; return; }

        let w = 1080, h = 1080;
        if(ratio==='9:16'){ h=1920; } else if(ratio==='16:9'){ w=1920; }
        worker.width = w; worker.height = h;
        container.innerHTML = '';
        
        const blocks = text.split(/\n\s*\n/).filter(b => b.trim() !== '');

        blocks.forEach((block, index) => {
            ctx.clearRect(0,0,w,h);
            const bg = userBgImage || presetImage;
            if(bg){
                const a = bg.width/bg.height, ca = w/h;
                let dw, dh, dx, dy;
                if(a>ca){ dh=bg.height; dw=dh*ca; dx=(bg.width-dw)/2; dy=0; }
                else { dw=bg.width; dh=dw/ca; dx=0; dy=(bg.height-dh)/2; }
                ctx.drawImage(bg, dx, dy, dw, dh, 0, 0, w, h);
            } else { ctx.fillStyle="#0f1115"; ctx.fillRect(0,0,w,h); }

            ctx.fillStyle=`rgba(0,0,0,${overlay})`; ctx.fillRect(0,0,w,h);
            
            // 枠線の描画
            if (frameT > 0) {
                ctx.strokeStyle = frameColor;
                ctx.lineWidth = frameT;
                const offset = frameT / 2 + (w * 0.04); 
                ctx.strokeRect(offset, offset, w - offset * 2, h - offset * 2);
            }

            // テキストの描画
            ctx.fillStyle = textColor; ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.shadowColor="rgba(0,0,0,0.5)"; ctx.shadowBlur=20;
            let sz = (w*0.06)*sizeScale;
            ctx.font=`600 ${sz}px ${font}`;
            const lines = block.trim().split('\n');
            lines.forEach((l,i) => ctx.fillText(l.trim(), w/2, h/2 + (i-(lines.length-1)/2)*sz*1.6));

            //署名
            ctx.font=`bold ${w*0.024}px 'Inter'`; ctx.fillStyle = frameColor;
            ctx.textAlign="right"; ctx.fillText(brandName, w-(w*0.08), h-(h*0.08));

            // カード個別の保存用
            const cardCanvas = document.createElement('canvas');
            cardCanvas.width = w; cardCanvas.height = h;
            cardCanvas.getContext('2d').drawImage(worker, 0, 0);

            const wrapper = document.createElement('div');
            wrapper.className='card-item';
            if(ratio==='9:16') wrapper.style.gridRow="span 2";
            
            const thumb = document.createElement('img');
            thumb.src = cardCanvas.toDataURL('image/png');

            const ctrls = document.createElement('div');
            ctrls.className = 'card-actions';

            const name = `メッセージカード_${index+1}`;

            const btnPNG = document.createElement('button');
            btnPNG.className = 'btn-save btn-png';
            btnPNG.innerText = '名前を付けて PNG保存';
            btnPNG.onclick = () => superSave(cardCanvas, name, 'png');

            const btnJPG = document.createElement('button');
            btnJPG.className = 'btn-save btn-jpg';
            btnJPG.innerText = '名前を付けて JPEG保存';
            btnJPG.onclick = () => superSave(cardCanvas, name, 'jpg');

            ctrls.appendChild(btnPNG);
            ctrls.appendChild(btnJPG);
            wrapper.appendChild(thumb);
            wrapper.appendChild(ctrls);
            container.appendChild(wrapper);
        });
    }

    document.querySelectorAll('.setting-input, #bg-preset, #size-select, #font-select, #text-input, #text-color, #frame-color, #frame-thickness-range, #font-size-range, #overlay-range').forEach(el => el.oninput = generateCards);
</script>
</body>
</html>
