<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Card Generator | Heartful Family</title>
    <style>
        :root {
            --primary-bg: #fdf6e3;
            --accent-color: #d33682;
            --text-color: #586e75;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #eee8d5;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { color: #b58900; text-align: center; margin-bottom: 5px; }
        .description { text-align: center; margin-bottom: 20px; font-size: 0.9em; color: #93a1a1; }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid #eee8d5;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            resize: vertical;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 1.2em;
        }

        .btn-generate {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(211, 54, 130, 0.3);
        }

        .btn-generate:hover {
            background-color: #af2b69;
            transform: translateY(-2px);
        }

        #preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 20px;
            width: 100%;
        }

        .preview-card {
            width: 100%;
            aspect-ratio: 1/1;
            border: 1px solid #ddd;
            border-radius: 15px;
            overflow: hidden;
            background: #fff;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .preview-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .download-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>メッセージカード一括生成くん</h1>
    <p class="description">貼り付けた文章をカードにします。空の行を入れると複数のカードに分かれます。</p>

    <textarea id="text-input" placeholder="ここに入力してください"></textarea>

    <div class="controls">
        <button class="btn-generate" onclick="generateCards()">画像を生成する</button>
    </div>

    <div id="preview-container"></div>
</div>

<canvas id="worker-canvas" width="800" height="800" style="display:none;"></canvas>

<script>
    function generateCards() {
        const text = document.getElementById('text-input').value;
        const container = document.getElementById('preview-container');
        const canvas = document.getElementById('worker-canvas');
        const ctx = canvas.getContext('2d');
        
        container.innerHTML = '生成中...';

        const blocks = text.split(/\n\s*\n/).filter(b => b.trim() !== '');
        container.innerHTML = '';
        
        blocks.forEach((block, index) => {
            const blockText = block.trim();
            const lines = blockText.split('\n');
            
            const grad = ctx.createRadialGradient(400, 400, 100, 400, 400, 600);
            grad.addColorStop(0, '#fff9f0');
            grad.addColorStop(1, '#ffe4e1');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 800, 800);
            
            ctx.fillStyle = 'rgba(211, 54, 130, 0.05)';
            ctx.beginPath(); ctx.arc(0, 0, 300, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(800, 800, 250, 0, Math.PI * 2); ctx.fill();

            ctx.strokeStyle = 'rgba(181, 137, 0, 0.3)';
            ctx.lineWidth = 10;
            ctx.strokeRect(50, 50, 700, 700);

            ctx.fillStyle = '#444'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            let fontSize = 42;
            if (blockText.length > 50) fontSize = 34;
            if (blockText.length > 100) fontSize = 28;
            ctx.font = `bold ${fontSize}px "Hiragino Mincho ProN", serif`;
            
            const lineHeight = fontSize * 1.6;
            const totalHeight = lines.length * lineHeight;
            let startY = 400 - (totalHeight / 2) + (lineHeight / 2);

            lines.forEach((line, i) => {
                ctx.fillText(line.trim(), 400, startY + (i * lineHeight));
            });
            
            const dataUrl = canvas.toDataURL('image/png');
            const div = document.createElement('div');
            div.className = 'preview-card';
            div.innerHTML = `<img src="${dataUrl}"><a href="${dataUrl}" download="card_${index+1}.png" class="download-btn">📥</a>`;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
