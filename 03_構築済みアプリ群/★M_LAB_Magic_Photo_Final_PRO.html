<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-LAB Magic Photo Converter | Final Perfect</title>
    <style>
        :root { --purple: #6c5ce7; --blue: #3498db; --bg: #f5f7fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px 20px; margin: 0; min-height: 100vh; color: #333; }
        .card { background: #fff; width: 1000px; padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); display: grid; grid-template-columns: 350px 1fr; gap: 40px; }
        h1 { color: var(--purple); margin: 0 0 5px 0; font-size: 1.8em; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.8em; color: var(--purple); }
        .btn-toggle-grp { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn-toggle { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 12px; background: #fff; cursor: pointer; font-weight: bold; font-size: 0.75em; transition: 0.2s; border: 2px solid #eee; }
        .btn-toggle.active { border-color: var(--purple); background: var(--purple); color: #fff; box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3); }
        .preview-pane { background: #2d3436; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .img-container { width: 100%; height: 500px; display: flex; justify-content: center; align-items: center; overflow: hidden; border-radius: 15px; background: #1a1a1a; margin-bottom: 20px; }
        #p-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-save { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; border: none; border-radius: 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .logo-chk { width: 60px; height: 60px; border: 1px solid #ddd; border-radius: 10px; background: #fff; margin-left: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .sub-panel { margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 18px; border: 1px solid #eee; }
    </style>
</head>
<body>
<div class="card">
    <div class="controls">
        <h1>Photo Magic Perfect</h1>
        <p style="color:#666; font-size:0.85em; margin-bottom:25px;">M-LAB Official Branding Perfect</p>
        <label>1. 写真をアップロード</label>
        <input type="file" id="f-in" style="width:100%; padding:8px; border:2px dashed #ddd; border-radius:12px; margin-bottom:20px;">
        <label>2. キャンバスサイズ</label>
        <div class="btn-toggle-grp">
            <button class="btn-toggle active" data-r="1:1" onclick="setR(this)">正方形</button>
            <button class="btn-toggle" data-r="4:5" onclick="setR(this)">縦長</button>
            <button class="btn-toggle" data-r="9:16" onclick="setR(this)">Story</button>
        </div>
        <label>3. 表示倍率</label>
        <input type="range" id="zoom-sl" min="0.4" max="1.0" step="0.01" value="1.0" oninput="draw()">
        <label>4. 魔法の仕上げ</label>
        <div class="btn-toggle-grp" style="display:flex; align-items:center;">
            <div style="flex:1; display:flex; gap:8px;">
                <button class="btn-toggle" id="wm-btn-on" onclick="setWM(true)">あり</button>
                <button class="btn-toggle active" id="wm-btn-off" onclick="setWM(false)">なし</button>
            </div>
            <div id="l-chk" class="logo-chk">✨</div>
        </div>
        <div id="wm-sub" style="display:none;" class="sub-panel">
            <div class="btn-toggle-grp">
                <button class="btn-toggle active" id="m-btn-text" onclick="setM('text')">文字</button>
                <button class="btn-toggle" id="m-btn-logo" onclick="setM('logo')">ロゴ</button>
            </div>
            <div id="text-opts">
                <input type="text" id="t-in" value="M-LAB PREMIUM" oninput="draw()" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;">
            </div>
            <div id="logo-opts" style="display:none;">
                <div class="btn-toggle-grp">
                    <button class="btn-toggle active" id="l-btn-wand" onclick="setL('wand')">ステッキ</button>
                    <button class="btn-toggle" id="l-btn-main" onclick="setL('main')">メイン</button>
                </div>
                <label style="color:#888; font-size:0.75em;">配置</label>
                <div class="btn-toggle-grp" id="pos-grp" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                    <button class="btn-toggle" onclick="setP('tl',this)">左上</button>
                    <button class="btn-toggle" onclick="setP('tr',this)">右上</button>
                    <button class="btn-toggle active" onclick="setP('bl',this)">左下</button>
                    <button class="btn-toggle" onclick="setP('br',this)">右下</button>
                </div>
                <label style="color:#888; font-size:0.75em;">サイズ</label>
                <input type="range" id="l-size-sl" min="50" max="600" value="250" oninput="draw()">
            </div>
        </div>
    </div>
    <div class="preview-pane">
        <div class="img-container"><canvas id="cv" style="display:none;"></canvas><img id="p-img" src=""></div>
        <button class="btn-save" onclick="save()">魔法で保存する ✨</button>
    </div>
</div>
<script>
    const cv=document.getElementById('cv'), ctx=cv.getContext('2d'), pImg=document.getElementById('p-img');
    let sourceImg=null, ratio='1:1', wmOn=false, mode='text', logo='wand', pos='bl';

    // 完璧なSVGロゴ
    const wandSVG = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><g transform="rotate(-15 50 50)"><path d="M20 80 L70 30" stroke="#abc6ff" stroke-width="4" stroke-linecap="round"/><circle cx="70" cy="30" r="15" fill="rgba(108, 92, 231, 0.4)"/><circle cx="70" cy="30" r="8" fill="#fff" opacity="0.8"/><circle cx="70" cy="30" r="3" fill="#fff"/></g></svg>`;
    const mainSVG = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="48" fill="#fff" stroke="#6c5ce7" stroke-width="2"/><path d="M50 15 L50 85 M15 50 L85 50 M40 18 L60 18" stroke="#6c5ce7" stroke-width="5" stroke-linecap="round" fill="none"/><path d="M30 75 Q50 90 70 75" stroke="#6c5ce7" stroke-width="6" fill="none" stroke-linecap="round"/><text x="50" y="65" font-family="Arial Black, Arial, sans-serif" font-size="13" fill="#6c5ce7" text-anchor="middle" font-weight="bold">M-LAB</text></svg>`;

    const imgW = new Image(), imgM = new Image();
    imgW.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(wandSVG)));
    imgM.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(mainSVG)));

    function draw() {
        if(!sourceImg) return;
        let tw=1080, th=1080; if(ratio=='4:5') th=1350; else if(ratio=='9:16') th=1920;
        cv.width=tw; cv.height=th; ctx.clearRect(0,0,tw,th);
        const z=parseFloat(document.getElementById('zoom-sl').value);
        const ir=sourceImg.width/sourceImg.height, cr=tw/th;
        ctx.save(); ctx.filter='blur(40px) brightness(0.7)';
        let sw,sh,sx,sy; if(ir>cr){sh=sourceImg.height; sw=sourceImg.height*cr; sx=(sourceImg.width-sw)/2; sy=0;} else {sw=sourceImg.width; sh=sourceImg.width/cr; sx=0; sy=(sourceImg.height-sh)/2;}
        ctx.drawImage(sourceImg,sx,sy,sw,sh,-20,-20,tw+40,th+40); ctx.restore();
        let dw,dh,dx,dy; if(ir>cr){dw=tw*z; dh=(tw/ir)*z;} else {dh=th*z; dw=(th*ir)*z;}
        dx=(tw-dw)/2; dy=(th-dh)/2;
        ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=30; ctx.drawImage(sourceImg,0,0,sourceImg.width,sourceImg.height,dx,dy,dw,dh);
        ctx.shadowBlur=0;
        if(wmOn){
            ctx.save();
            if(mode === 'logo'){
                ctx.globalAlpha=1.0; const img=(logo=='wand')?imgW:imgM;
                const s=parseInt(document.getElementById('l-size-sl').value);
                let lx,ly; if(pos=='br'){lx=tw-s-30;ly=th-s-30;} else if(pos=='bl'){lx=30;ly=th-s-30;} else if(pos=='tr'){lx=tw-s-30;ly=30;} else if(pos=='tl'){lx=30;ly=30;}
                ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=15; ctx.drawImage(img,lx,ly,s,s);
                document.getElementById('l-chk').innerHTML = `<img src="${img.src}" style="width:100%;height:100%;object-fit:contain;">`;
            } else {
                const t=document.getElementById('t-in').value; ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(tw-400,th-85,400,85);
                ctx.font="bold 34px sans-serif"; ctx.fillStyle="#fff"; ctx.textAlign="right"; ctx.fillText(t,tw-30,th-32);
                document.getElementById('l-chk').innerHTML = '🔡';
            }
            ctx.restore();
        } else { document.getElementById('l-chk').innerHTML = '✨'; }
        pImg.src=cv.toDataURL('image/jpeg',0.9);
    }
    document.getElementById('f-in').onchange=(e)=>{
        const f=e.target.files[0]; if(!f)return;
        const r=new FileReader(); r.onload=(ae)=>{ const i=new Image(); i.onload=()=>{sourceImg=i;draw();}; i.src=ae.target.result; }; r.readAsDataURL(f);
    };
    window.setR=(btn)=>{ ratio=btn.dataset.r; Array.from(btn.parentElement.children).forEach(b=>b.classList.remove('active')); btn.classList.add('active'); draw(); };
    window.setWM=(on)=>{ wmOn=on; act('wm-btn-on',on); act('wm-btn-off',!on); document.getElementById('wm-sub').style.display=on?'block':'none'; draw(); };
    window.setM=(m)=>{ mode=m; act('m-btn-text',m=='text'); act('m-btn-logo',m=='logo'); document.getElementById('text-opts').style.display=m=='text'?'block':'none'; document.getElementById('logo-opts').style.display=m=='logo'?'block':'none'; draw(); };
    window.setL=(l)=>{ logo=l; act('l-btn-wand',l=='wand'); act('l-btn-main',l=='main'); draw(); };
    window.setP=(p,btn)=>{ pos=p; Array.from(btn.parentElement.children).forEach(b=>b.classList.remove('active')); btn.classList.add('active'); draw(); };
    function act(id,a){ const el=document.getElementById(id); if(el) el.classList.toggle('active',a); }
    window.save=()=>{if(!sourceImg)return;const a=document.createElement('a');a.download=`m_lab_${Date.now()}.jpg`;a.href=cv.toDataURL('image/jpeg',0.95);a.click();};
    imgW.onload=imgM.onload=draw;
</script>
</body>
</html>
