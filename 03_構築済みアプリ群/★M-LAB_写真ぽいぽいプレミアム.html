<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-LAB | 写真ぽいぽいプレミアム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --gold-dark: #a67c37;
            --bg: #0a0b0e;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
            --text-dim: #888;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(197, 160, 89, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(197, 160, 89, 0.05) 0%, transparent 40%);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header { padding: 60px 20px 20px; text-align: center; }
        .logo-area h1 {
            font-family: 'Noto Serif JP', serif; font-size: 3rem; letter-spacing: 0.2em; margin: 0;
            background: linear-gradient(to bottom, #fdfcfb 0%, #e2d1c3 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.3));
        }
        .logo-area p { color: var(--gold); letter-spacing: 0.5em; font-size: 0.75rem; font-weight: 700; margin: 10px 0 0; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; text-align: center; }

        .btn-mode-toggle {
            background: var(--card-bg); border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 24px; border-radius: 40px; font-weight: 800; cursor: pointer; margin-bottom: 30px;
        }
        .btn-mode-toggle.active { background: var(--gold); color: #000; }

        .drop-zone {
            width: 100%; height: 160px; border: 2px dashed var(--border); border-radius: 25px;
            background: rgba(255, 255, 255, 0.02); display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; margin-bottom: 40px; backdrop-filter: blur(10px);
        }
        .drop-zone:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
        .drop-zone span { font-weight: 700; font-size: 1rem; color: var(--gold); }
        .drop-zone p { font-size: 0.75rem; opacity: 0.6; margin-top: 8px; }

        /* --- Filters --- */
        .filter-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 5px; }
        .filter-btn {
            padding: 10px 20px; border-radius: 30px; border: 1px solid var(--border);
            background: var(--card-bg); color: var(--text); cursor: pointer; font-size: 0.85rem; font-weight: 600;
        }
        .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3); }
        
        .add-tag-btn {
            background: transparent; border: 1px dashed var(--gold); color: var(--gold);
            padding: 10px 15px; border-radius: 30px; cursor: pointer; font-weight: 800; font-size: 0.85rem;
        }
        .add-tag-btn:hover { background: var(--gold); color: #000; border-style: solid; }

        /* --- Gallery --- */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 220px; grid-auto-flow: dense; gap: 25px; padding-bottom: 120px;
        }
        .photo-card {
            position: relative; border-radius: 20px; overflow: hidden; background: #111;
            cursor: pointer; border: 1px solid var(--border);
        }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-card:hover { transform: translateY(-8px); border-color: var(--gold); z-index: 5; }
        .photo-card.selected { border: 4px solid var(--gold); scale: 0.96; }
        .selection-indicator {
            position: absolute; top: 15px; right: 15px; width: 28px; height: 28px;
            background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .selection-indicator::after { content: '✓'; color: #000; font-weight: 900; }

        .card-info {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
            display: flex; flex-direction: column; gap: 5px;
        }
        .tag-badge {
            display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 900; width: fit-content;
        }
        .card-name { font-size: 0.9rem; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

        /* --- Bulk Action Bar --- */
        #bulk-action-bar {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 900px; background: rgba(197, 160, 89, 0.95); backdrop-filter: blur(15px);
            padding: 15px 30px; border-radius: 20px 20px 0 0; display: flex; align-items: center; gap: 20px;
            z-index: 2000; box-shadow: 0 -15px 50px rgba(0,0,0,0.6); transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #bulk-action-bar.visible { bottom: 0; }
        .selected-info { color: #000; font-weight: 900; font-size: 0.9rem; }
        .bulk-tag-scroll { display: flex; gap: 8px; flex-grow: 1; overflow-x: auto; padding-bottom: 5px; }
        .bulk-tag-item {
            background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap;
        }

        /* --- Toast --- */
        #toast {
            position: fixed; top: 30px; right: 30px; background: var(--gold); color: #000;
            padding: 15px 30px; border-radius: 12px; font-weight: 800; transform: translateX(150%);
            transition: 0.4s; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toast.visible { transform: translateX(0); }

        /* --- Lightbox --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98);
            display: none; z-index: 2500; padding: 40px; justify-content: center; align-items: center;
        }
        .lb-content { max-width: 1200px; width: 100%; display: grid; grid-template-columns: 1fr 380px; gap: 40px; height: 90vh; }
        .lb-img-box { background: #000; display: flex; align-items: center; justify-content: center; border-radius: 20px; overflow: hidden; }
        .lb-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .lb-side { display: flex; flex-direction: column; gap: 20px; }
        .lb-input { background: #222; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 10px; width: 100%; font-size: 1rem; }
        .close-lb { position: absolute; top: 30px; right: 30px; background: none; border: none; color: #fff; font-size: 3rem; cursor: pointer; }

        .fab-stack { position: fixed; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .fab { width: 60px; height: 60px; border-radius: 50%; background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 10px 30px rgba(197,160,89,0.4); }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>写真ぽいぽい</h1>
        <p>M-LAB PREMIUM ARCHIVE</p>
    </div>
</header>

<div class="container">
    <button id="select-mode-btn" class="btn-mode-toggle" onclick="toggleSelectMode()">まとめ整理・一括選択</button>

    <label for="file-input" class="drop-zone" id="drop-zone">
        <span>フォルダ・写真をドロップ、または Ctrl + V で貼り付け</span>
        <p>Googleフォトでコピーした写真もそのまま「ぽい」できます</p>
        <input type="file" id="file-input" multiple accept="image/*" style="display:none">
    </label>

    <div class="filter-wrapper">
        <div class="filter-bar" id="filter-bar">
            <!-- Filters injected -->
        </div>
        <button class="add-tag-btn" onclick="addNewTag()">＋ カテゴリー追加</button>
    </div>

    <main class="gallery-grid" id="gallery-grid">
        <!-- Grid injected -->
    </main>
</div>

<div id="bulk-action-bar">
    <div id="bulk-count" class="selected-info">0枚選択中</div>
    <div class="bulk-tag-scroll" id="bulk-tag-btns">
        <!-- Bulk tags injected -->
    </div>
    <button onclick="bulkDelete()" style="background:#000; color:#ff4444; border:1px solid #ff4444; padding:8px 15px; border-radius:8px; font-weight:700; cursor:pointer;">一括削除</button>
    <button onclick="clearSelection()" style="background:none; border:none; color:#000; font-weight:900; cursor:pointer; text-decoration:underline;">解除</button>
</div>

<div id="toast">✅ メッセージ</div>

<div id="lightbox">
    <button class="close-lb" onclick="closeLightbox()">&times;</button>
    <div class="lb-content">
        <div class="lb-img-box"><img id="lb-img" src=""></div>
        <div class="lb-side">
            <input type="text" id="lb-title" class="lb-input" placeholder="タイトル...">
            <textarea id="lb-desc" class="lb-input" style="height:150px; resize:none;" placeholder="思い出メモ..."></textarea>
            <div id="lb-tags-area" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
            <div style="margin-top:auto; display:flex; gap:10px;">
                <button onclick="saveDetail()" style="flex:1; padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:800; cursor:pointer;">保存</button>
                <button onclick="deletePhoto()" style="padding:15px; background:none; border:1px solid #ff4444; color:#ff4444; border-radius:10px; cursor:pointer;">削除</button>
            </div>
        </div>
    </div>
</div>

<div class="fab-stack">
    <div class="fab" onclick="exportData()" title="保存">💾</div>
    <div class="fab" onclick="importData()" title="読み込み">📂</div>
</div>

<script>
    let photos = [];
    let customTags = ['学校', 'eスポーツ', '家族', '旅行', 'その他'];
    let currentFilter = 'all';
    let selectedIds = new Set();
    let isSelectMode = false;
    let editId = null;

    // --- Init ---
    window.onload = () => {
        const savedTags = localStorage.getItem('mlab_poipoi_tags');
        if(savedTags) customTags = JSON.parse(savedTags);
        renderFilters();
        renderBulkButtons();
    };

    // --- Dropper (Recursive Folder Support) ---
    const dz = document.getElementById('drop-zone');
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.borderColor = "#fff"; });
    dz.addEventListener('dragleave', () => { dz.style.borderColor = "var(--border)"; });
    dz.addEventListener('drop', (e) => {
        e.preventDefault();
        dz.style.borderColor = "var(--border)";
        const items = e.dataTransfer.items;
        if(items) {
            for(let i=0; i<items.length; i++) {
                const entry = items[i].webkitGetAsEntry();
                if(entry) scanEntry(entry);
            }
        }
    });

    function scanEntry(entry) {
        if(entry.isFile) {
            entry.file(f => { if(f.type.startsWith('image/')) processFile(f); });
        } else if(entry.isDirectory) {
            const reader = entry.createReader();
            const readEntries = () => {
                reader.readEntries(entries => {
                    if(entries.length > 0) {
                        for(let e of entries) scanEntry(e);
                        readEntries();
                    }
                });
            };
            readEntries();
        }
    }

    document.getElementById('file-input').onchange = (e) => {
        for(let f of e.target.files) processFile(f);
    };

    window.addEventListener('paste', (e) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for(let item of items) {
            if(item.type.indexOf('image') !== -1) processFile(item.getAsFile());
        }
    });

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = (re) => {
            const img = new Image();
            img.onload = () => {
                const id = Date.now() + Math.random().toString(36).substr(2, 5);
                const ratio = img.width / img.height;
                const aspect = ratio > 1.4 ? 'wide' : (ratio < 0.75 ? 'tall' : 'square');
                photos.push({ id, src: re.target.result, title: file.name.split('.')[0], date: new Date().toLocaleDateString(), desc:'', tags:['未整理'], aspect });
                renderGallery();
            };
            img.src = re.target.result;
        };
        reader.readAsDataURL(file);
    }

    // --- UI Rendering ---
    function renderFilters() {
        const bar = document.getElementById('filter-bar');
        bar.innerHTML = `<button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">すべて表示</button>`;
        [...customTags, '未整理'].forEach(tag => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${currentFilter===tag?'active':''}`;
            btn.innerText = tag;
            btn.onclick = () => setFilter(tag);
            bar.appendChild(btn);
        });
    }

    function renderBulkButtons() {
        const bar = document.getElementById('bulk-tag-btns');
        bar.innerHTML = '';
        [...customTags, '未整理'].forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'bulk-tag-item';
            btn.innerText = tag;
            btn.onclick = () => bulkApplyTag(tag);
            bar.appendChild(btn);
        });
    }

    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        const filtered = currentFilter === 'all' ? photos : photos.filter(p => p.tags.includes(currentFilter));

        if(filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; padding:80px; opacity:0.3;">写真がありません。ぽいぽい放り込んでください！</div>';
            updateBulkUI();
            return;
        }

        filtered.forEach(p => {
            const isSelected = selectedIds.has(p.id);
            const card = document.createElement('div');
            card.className = `photo-card ${p.aspect==='wide'?'span-w':(p.aspect==='tall'?'span-h':'')} ${isSelected?'selected':''}`;
            card.innerHTML = `
                <img src="${p.src}">
                ${isSelectMode ? '<div class="selection-indicator"></div>' : ''}
                <div class="card-info">
                    <span class="tag-badge" style="background:${p.tags[0]==='未整理'?'rgba(255,255,255,0.1)':'var(--gold)'}; color:${p.tags[0]==='未整理'?'#fff':'#000'};">${p.tags[0]}</span>
                    <p class="card-name">${p.title}</p>
                </div>
            `;
            card.onclick = () => isSelectMode ? toggleSelect(p.id) : openLightbox(p.id);
            grid.appendChild(card);
        });
        updateBulkUI();
    }

    // --- Actions ---
    function addNewTag() {
        const name = prompt("新しいカテゴリー（仕分けフォルダー）の名前は？");
        if(name && !customTags.includes(name)) {
            customTags.push(name);
            localStorage.setItem('mlab_poipoi_tags', JSON.stringify(customTags));
            renderFilters(); renderBulkButtons();
            showToast(`「${name}」を追加しました！`);
        }
    }

    function toggleSelectMode() {
        isSelectMode = !isSelectMode;
        if(!isSelectMode) selectedIds.clear();
        const btn = document.getElementById('select-mode-btn');
        btn.innerText = isSelectMode ? "選択モード終了" : "まとめ整理・一括選択";
        btn.classList.toggle('active', isSelectMode);
        renderGallery();
    }

    function toggleSelect(id) {
        if(selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        renderGallery();
    }

    function updateBulkUI() {
        const bar = document.getElementById('bulk-action-bar');
        if(selectedIds.size > 0) {
            bar.classList.add('visible');
            document.getElementById('bulk-count').innerText = `${selectedIds.size}枚選択中...`;
        } else bar.classList.remove('visible');
    }

    function bulkApplyTag(tag) {
        const count = selectedIds.size;
        photos.forEach(p => { if(selectedIds.has(p.id)) p.tags = [tag]; });
        showToast(`${count}枚を「${tag}」へ移動しました！`);
        selectedIds.clear();
        renderGallery();
    }

    function setFilter(f) { currentFilter = f; renderFilters(); renderGallery(); }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('visible');
        setTimeout(() => t.classList.remove('visible'), 3000);
    }

    // --- Lightbox ---
    function openLightbox(id) {
        const p = photos.find(x => x.id === id);
        editId = id;
        document.getElementById('lb-img').src = p.src;
        document.getElementById('lb-title').value = p.title;
        document.getElementById('lb-desc').value = p.desc;
        const area = document.getElementById('lb-tags-area');
        area.innerHTML = '';
        [...customTags, '未整理'].forEach(t => {
            const btn = document.createElement('button');
            btn.className = `tag-btn ${p.tags.includes(t)?'active':''}`;
            btn.style = `padding:8px 15px; border-radius:8px; border:1px solid var(--border); background:${p.tags.includes(t)?'var(--gold)':'#111'}; color:${p.tags.includes(t)?'#000':'#ccc'}; cursor:pointer; font-weight:700;`;
            btn.innerText = t;
            btn.onclick = () => { p.tags = [t]; openLightbox(editId); };
            area.appendChild(btn);
        });
        document.getElementById('lightbox').style.display = 'flex';
    }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
    function saveDetail() {
        const p = photos.find(x => x.id === editId);
        p.title = document.getElementById('lb-title').value;
        p.desc = document.getElementById('lb-desc').value;
        closeLightbox(); renderGallery();
    }
    function deletePhoto() {
        if(confirm("削除しますか？")) { photos = photos.filter(x => x.id !== editId); closeLightbox(); renderGallery(); }
    }
    function bulkDelete() {
        if(confirm(`${selectedIds.size}枚をまとめて削除しますか？`)) { photos = photos.filter(p => !selectedIds.has(p.id)); selectedIds.clear(); renderGallery(); }
    }
    function clearSelection() { selectedIds.clear(); renderGallery(); }

    // --- Persistence ---
    function exportData() {
        const blob = new Blob([JSON.stringify({ photos, customTags })], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `写真ぽいぽい_${new Date().toISOString().slice(0,10)}.json`; a.click();
    }
    function importData() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (re) => {
                const data = JSON.parse(re.target.result);
                if(data.photos) photos = data.photos;
                if(data.customTags) { customTags = data.customTags; localStorage.setItem('mlab_poipoi_tags', JSON.stringify(customTags)); }
                renderFilters(); renderBulkButtons(); renderGallery();
                showToast("データを読み込みました！");
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }
</script>
</body>
</html>
