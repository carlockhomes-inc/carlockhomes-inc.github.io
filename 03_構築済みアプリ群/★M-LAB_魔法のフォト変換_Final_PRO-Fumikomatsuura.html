<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-LAB Photo Magic Lab | Final Pro V5</title>
    <style>
        :root { --purple: #6c5ce7; --blue: #3498db; --bg: #f5f7fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px 20px; margin: 0; min-height: 100vh; color: #333; }
        .card { background: #fff; width: 1000px; padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); display: grid; grid-template-columns: 350px 1fr; gap: 40px; }
        h1 { color: var(--purple); margin: 0 0 5px 0; font-size: 1.8em; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.8em; color: var(--purple); }
        .btn-toggle-grp { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-toggle { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 12px; background: #fff; cursor: pointer; font-weight: bold; font-size: 0.75em; transition: 0.3s; }
        .btn-toggle.active { border-color: var(--purple); background: var(--purple); color: #fff; }
        .preview-pane { background: #2d3436; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .img-container { width: 100%; height: 500px; display: flex; justify-content: center; align-items: center; overflow: hidden; border-radius: 10px; background: #000; margin-bottom: 20px; }
        #p-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-save { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; border: none; border-radius: 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3); }
        input[type="range"] { width: 100%; cursor: pointer; }
        .sub-panel { margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 15px; border: 1px solid #eee; }
    </style>
</head>
<body>
<div class="card">
    <div class="controls">
        <h1>Photo Magic Lab</h1>
        <p style="color:#666; font-size:0.85em; margin-bottom:30px;">M-LAB公式 魔法のブランディング V5</p>
        
        <div class="form-group" style="margin-bottom:25px;">
            <label>1. 写真をアップロード</label>
            <input type="file" id="f-in" style="width:100%; padding:10px; border:2px dashed #ddd; border-radius:12px;">
        </div>

        <div class="form-group" style="margin-bottom:25px;">
            <label>2. キャンバスサイズ</label>
            <div class="btn-toggle-grp" id="ratio-panel">
                <button class="btn-toggle active" data-r="1:1" onclick="setR(this)">正方形</button>
                <button class="btn-toggle" data-r="4:5" onclick="setR(this)">縦長</button>
                <button class="btn-toggle" data-r="9:16" onclick="setR(this)">Story</button>
            </div>
        </div>

        <div class="form-group" style="margin-bottom:25px;">
            <label>3. 表示倍率 <span id="v-zoom">100</span>%</label>
            <input type="range" id="zoom-sl" min="0.4" max="1.0" step="0.01" value="1.0" oninput="draw()">
        </div>

        <div class="form-group">
            <label>4. 魔法のウォーターマーク</label>
            <div class="btn-toggle-grp">
                <button class="btn-toggle" id="wm-on-btn" onclick="toggleWM(true)">あり</button>
                <button class="btn-toggle active" id="wm-off-btn" onclick="toggleWM(false)">なし</button>
            </div>
            
            <div id="wm-sub" style="display:none;" class="sub-panel">
                <div class="btn-toggle-grp">
                    <button class="btn-toggle active" id="mode-text-btn" onclick="setM('text')">文字</button>
                    <button class="btn-toggle" id="mode-logo-btn" onclick="setM('logo')">ロゴ</button>
                </div>

                <div id="text-opts">
                    <input type="text" id="t-in" value="M-LAB PREMIUM" oninput="draw()" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;">
                </div>

                <div id="logo-opts" style="display:none;">
                    <div class="btn-toggle-grp">
                        <button class="btn-toggle active" id="l-wand-btn" onclick="setL('wand')">ステッキ</button>
                        <button class="btn-toggle" id="l-main-btn" onclick="setL('main')">メイン</button>
                    </div>
                    <label style="color:#888; font-size:0.75em; margin-top:10px;">配置</label>
                    <div class="btn-toggle-grp" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                        <button class="btn-toggle btn-pos" onclick="setP('tl', this)">左上</button>
                        <button class="btn-toggle btn-pos" onclick="setP('tr', this)">右上</button>
                        <button class="btn-toggle btn-pos" onclick="setP('bl', this)">左下</button>
                        <button class="btn-toggle btn-pos active" onclick="setP('br', this)">右下</button>
                    </div>
                    <label style="color:#888; font-size:0.75em; margin-top:10px;">大きさ <span id="v-lsize">250</span>px</label>
                    <input type="range" id="l-size-sl" min="50" max="600" value="250" oninput="draw()">
                </div>
            </div>
        </div>
    </div>

    <div class="preview-pane">
        <div class="img-container">
            <canvas id="cv" style="display:none;"></canvas>
            <img id="p-img" src="">
        </div>
        <button class="btn-save" onclick="save()">魔法で保存する ✨</button>
    </div>
</div>

    const mainData = `data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAABC8SURBVHhe7VsJdFRVms7M6Z4zc870ONN9+ow6jtqKjguKbBLZEouEBLKSPSEJSQhmJySRRBZZAwTZQQEFRBYj3SrSGpGlFWjFVugRJEISyFKpVCq1b++9qlevlm/OfysVYohY1ZrRVv5zvnPfu+/m1f2/+y93eQn68+cXI9V6Y13j5aa6lmttdR2diroOhaJOpVL1QalU9kGhUNRdunSJobGxse/6xwbqW3/0f3bx4kVWR7oENV5p3gIAJpMJJpMZDocEjuNhs9nYtbd0wMpx8Hg81BSdnZ0MPT09UKlUX8NgdTdDd3f394aB7yao1WrodFoYDDrI5XIolUpca2lCT48Ker0eQe0K5WpJkmCxWMDzPKxWKys5juu7JuXp2mK1wmy2MCXpB31lf2W6urr6nvWvp3tfXXc/oqgT3xdIWUL/vrW2XsOFC404c+ocjEYjVFo1zl/phEHeBUEQEKTWGVbTqBqNBvYS+iOyBrPZDIPBwMqeHjU6FQoourqgUCigVPoUJYY10Ol0DHSv7O6GRquFqqcHXUolurqUjHWqp07RfVt7O7qU3ayNy+WC2+32Cz4L9And939Gg0T9JRJIB9LnypVGHH3/L9j50kdwuZww8UZ8EEAAA7697X0XvS/m9f0f0T9T6f/h/43ofxX9rxYAsID/APm6X776E/F/H9/38X0f3/fxfR/f9/F9H19D97XFfxtEv6ZCv6HPiP4b9L97qO8hqFfUKer77/m9F108N2Ag3d9Dc/DcgAF0fQ9L9eAFTmQ7VOK1ah+4jb1HdI/MIno8ERidAYyP0nB5F/rOayO93rD1D9NOfyn9H9f7f4O9T+LeX//pfe9X/f2D/R8A7/nvD9of9B8fdfu/AOD7BwDqH/WPfR3CPom7UY+/mQCC6HEDAf5YAIH+mNBvAunVAnR7N/r+Z7/9+v8y3df033udv7ivv39f9776/r9M9zX9H9f7Pwf6Cf6J+G8E/waA7x8AqPvUj9c97uP6C/2Ovh/6n/QfH30H0XUQfUvRP0P0K/7ugf6mArN/0f8G0a+p0G/oM6L/Bv3vHup7COoVdYp64f89Yn2h/60R6y/+T4X66zKE/q/wfxL8uxX+H/7fCP96of66DKH/G0A9o47R/1f8/TfS39f9feUfVj/u4LkBvAALXpAFT2R/66B9ZTrv0H8T3f8m3vXG62Yj4V9uE6AIdBvscHokOHR2mKy99p51fE69L9d9XdKfrD+O86X70fPofZivN/Olo8Y7YPe7EaAsIAvIAnSAnI8EOHSAB8HtkKEn5UIdS0v6XFrSx2HjMCHpS9N9mZ66L/uX6Unz6X6YjzTDH7Z/888I8HcgX6Z3oZ6+7+oZ6j8j6mfoXv867H0S96Y8f6cC7v06E/47Aupj/R1In2H9E9Gv6Zf1z/ov8vX3h+neMCHpX4dO8H8e+CfhB1G/mX99/0P0z5D9+v+A/v0P/W2f6Nf3/1Z+Z8V/G8S/O8X9N8j/q7o1/8T7z7XoT9fPz9Y3f1d+YfV35D7K/4+n/6X8n97/f/Z9z6/0D9uAf8B8vW63Z9E/Wb9U9Gv6Zf1z/ov8vX3h+neMCHpX4dO8H8e+CfhB1G/mX99/0P0z5D9+v+A/v0P/fW2f6Nf3/1Z+Z8V/G8S/O8X9N8j/q7o1/8T7z7XoT9fPz9Y3f1d+YfV35D7K/4+n/6X8n97/f/Z9z6/0D9uAf8B8vW63Z9E/Wb9U9Gv6Zf1z/ov8vX3h+neMCHpX4dO8H8e+CfhB1G/mX99/0P0z5D9+v+A/v0P/fW2f6Nf3/1Z+Z8V/G8S/O8X9N8j/q7o1/8T7z7XoT9fPz9Y3f1d+YfV35D7K X99/0P0z5D9+v+A/v0P/fW2f6Nf3/1Z+Z8V/G8S/O8X9N8j/q7o1/8T7z7XoT9fPz9Y3f1d+YfV35D7K/4+n/6X8n97/f/Z9z6/0D9uAf8B8vW63Z9E/Wb9U9Gv6Zf1z/ov8vX3h+neMCHpX4dO8H8e+CfhB1G/mX99/0P0z5D9+v+A/v0P/fW2f6Nf3/1Z+Z8V/G8S/O8X9N8j/q7o1/8T7z7XoT9fPz9Y3f1d+YfV35D7K/4+n/6X8n97/f/Z9z6/0D9uAf8B8vW63Z9E/Wb9U9Gv6Zf1z/ov8vX3h+neMCHunYmffp06c//AWAU2K77277EAAAAABJRU5ErkJggg==`;

    const iWand = new Image(), iMain = new Image();
    iWand.src = wandData; iMain.src = mainData;

    function draw() {
        if(!source) return;
        let tw=1080, th=1080;
        if(ratio=='4:5') th=1350; else if(ratio=='9:16') th=1920;
        cv.width=tw; cv.height=th;
        ctx.clearRect(0,0,tw,th);

        const z=parseFloat(document.getElementById('zoom-sl').value);
        const ir=source.width/source.height, cr=tw/th;

        ctx.save(); ctx.filter='blur(40px) brightness(0.7)';
        let sw,sh,sx,sy;
        if(ir>cr){sh=source.height; sw=source.height*cr; sx=(source.width-sw)/2; sy=0;} else {sw=source.width; sh=source.width/cr; sx=0; sy=(source.height-sh)/2;}
        ctx.drawImage(source,sx,sy,sw,sh,-20,-20,tw+40,th+40); ctx.restore();

        let dw,dh,dx,dy;
        if(ir>cr){dw=tw*z; dh=(tw/ir)*z;} else {dh=th*z; dw=(th*ir)*z;}
        dx=(tw-dw)/2; dy=(th-dh)/2;
        ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=30; ctx.drawImage(source,0,0,source.width,source.height,dx,dy,dw,dh);
        ctx.shadowBlur=0;

        if(wmOn){
            ctx.save();
            if(mode === 'logo'){
                ctx.globalAlpha=1.0;
                const img=(logo=='wand')?iWand:iMain;
                const s=parseInt(document.getElementById('l-size-sl').value);
                let lx,ly;
                if(pos=='br'){lx=tw-s-30;ly=th-s-30;} else if(pos=='bl'){lx=30;ly=th-s-30;}
                else if(pos=='tr'){lx=tw-s-30;ly=30;} else if(pos=='tl'){lx=30;ly=30;}
                ctx.drawImage(img,lx,ly,s,s);
            } else {
                const t=document.getElementById('t-in').value;
                ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(tw-400,th-80,400,80);
                ctx.font="bold 32px sans-serif"; ctx.fillStyle="#fff"; ctx.textAlign="right"; ctx.fillText(t,tw-30,th-30);
            }
            ctx.restore();
        }
        pImg.src=cv.toDataURL('image/jpeg',0.9);
    }

    document.getElementById('f-in').onchange=(e)=>{
        const f=e.target.files[0]; if(!f)return;
        const r=new FileReader(); r.onload=(ae)=>{ const i=new Image(); i.onload=()=>{source=i;draw();}; i.src=ae.target.result; }; r.readAsDataURL(f);
    };

    window.setR=(btn)=>{
        ratio=btn.dataset.r; Array.from(btn.parentElement.children).forEach(b=>b.classList.remove('active')); btn.classList.add('active'); draw();
    };
    window.toggleWM=(on)=>{
        wmOn=on; act('wm-on-btn',on); act('wm-off-btn',!on); document.getElementById('wm-sub').style.display=on?'block':'none'; draw();
    };
    window.setM=(m)=>{
        mode=m; act('mode-text-btn',m=='text'); act('mode-logo-btn',m=='logo');
        document.getElementById('text-opts').style.display=m=='text'?'block':'none';
        document.getElementById('logo-opts').style.display=m=='logo'?'block':'none'; draw();
    };
    window.setL=(l)=>{
        logo=l; act('l-wand-btn',l=='wand'); act('l-main-btn',l=='main'); draw();
    };
    window.setP=(p, btn)=>{
        pos=p; Array.from(btn.parentElement.children).forEach(b=>b.classList.remove('active')); btn.classList.add('active'); draw();
    };

    function act(id,a){ const el=document.getElementById(id); if(el) el.classList.toggle('active',a); }
    function save(){if(!source)return;const a=document.createElement('a');a.download=`m_lab_${Date.now()}.jpg`;a.href=cv.toDataURL('image/jpeg',0.95);a.click();};
    
    iWait = setInterval(()=>{ if(iWand.complete && iMain.complete){ clearInterval(iWait); draw(); } }, 100);
</script>
</body>
</html>
