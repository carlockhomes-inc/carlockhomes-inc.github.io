<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Card Generator | Heartful Family</title>
    <style>
        :root {
            --primary-bg: #fdf6e3;
            --accent-color: #d33682;
            --text-color: #586e75;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #eee8d5;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { color: #b58900; text-align: center; margin-bottom: 5px; }
        .description { text-align: center; margin-bottom: 20px; font-size: 0.9em; color: #93a1a1; }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .bg-picker {
            border: 2px solid #eee8d5;
            padding: 15px;
            border-radius: 10px;
            background: #fdf6e3;
        }

        .bg-options {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .bg-box {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
        }

        .bg-box.active { border-color: var(--accent-color); transform: scale(1.1); }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #eee8d5;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .controls { text-align: center; margin-bottom: 30px; }
        button {
            padding: 15px 50px;
            border: none;
            border-radius: 35px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2em;
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(211, 54, 130, 0.3);
        }

        #preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .preview-card {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 15px;
            overflow: hidden;
            background: #fff;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .preview-card img { width: 100%; height: 100%; object-fit: cover; }
        .download-btn {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>メッセージカード・セレクト版</h1>
    <p class="description">5色の背景から選べるバージョンです。改行はそのまま反映されます。</p>

    <div class="settings-grid">
        <div class="bg-picker">
            <strong>1. 背景色を選択</strong>
            <div class="bg-options" id="bg-options">
                <div class="bg-box active" style="background: linear-gradient(135deg, #fff9f0, #ffe4e1);" data-bg="1" title="ピンク系"></div>
                <div class="bg-box" style="background: linear-gradient(135deg, #e0f7fa, #e1f5fe);" data-bg="2" title="ブルー系"></div>
                <div class="bg-box" style="background: linear-gradient(135deg, #f3e5f5, #fce4ec);" data-bg="3" title="パープル系"></div>
                <div class="bg-box" style="background: linear-gradient(135deg, #fffde7, #fff9c4);" data-bg="4" title="イエロー系"></div>
                <div class="bg-box" style="background: #ffffff; border: 1px solid #ddd;" data-bg="5" title="ホワイト"></div>
            </div>
        </div>
        <div style="padding-top: 15px; font-size: 0.9em;">
            <strong>2. メッセージを入力</strong><br>
            改行はそのまま画像になります。<br>
            空の行をいれると別のカードに分かれます。
        </div>
    </div>

    <textarea id="text-input" placeholder="ここに入力してください"></textarea>

    <div class="controls">
        <button onclick="generateCards()">カードを一括生成！</button>
    </div>

    <div id="preview-container"></div>
</div>

<canvas id="worker-canvas" width="800" height="800" style="display:none;"></canvas>

<script>
    let selectedBg = '1';
    document.getElementById('bg-options').addEventListener('click', (e) => {
        if (e.target.dataset.bg) {
            document.querySelectorAll('.bg-box').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            selectedBg = e.target.dataset.bg;
        }
    });

    function generateCards() {
        const text = document.getElementById('text-input').value;
        const container = document.getElementById('preview-container');
        const canvas = document.getElementById('worker-canvas');
        const ctx = canvas.getContext('2d');
        container.innerHTML = '';

        const blocks = text.split(/\n\s*\n/).filter(b => b.trim() !== '');

        blocks.forEach((block, index) => {
            ctx.clearRect(0, 0, 800, 800);
            
            // 背景描画
            if (selectedBg === '1') {
                const g = ctx.createLinearGradient(0,0,800,800);
                g.addColorStop(0, '#fff9f0'); g.addColorStop(1, '#ffe4e1');
                ctx.fillStyle = g;
            } else if (selectedBg === '2') {
                const g = ctx.createLinearGradient(0,0,800,800);
                g.addColorStop(0, '#e0f7fa'); g.addColorStop(1, '#e1f5fe');
                ctx.fillStyle = g;
            } else if (selectedBg === '3') {
                const g = ctx.createLinearGradient(0,0,800,800);
                g.addColorStop(0, '#f3e5f5'); g.addColorStop(1, '#fce4ec');
                ctx.fillStyle = g;
            } else if (selectedBg === '4') {
                const g = ctx.createLinearGradient(0,0,800,800);
                g.addColorStop(0, '#fffde7'); g.addColorStop(1, '#fff9c4');
                ctx.fillStyle = g;
            } else {
                ctx.fillStyle = '#ffffff';
            }
            ctx.fillRect(0, 0, 800, 800);

            // 装飾
            ctx.strokeStyle = 'rgba(181, 137, 0, 0.2)';
            ctx.lineWidth = 15;
            ctx.strokeRect(40, 40, 720, 720);

            // テキスト
            const lines = block.trim().split('\n');
            ctx.fillStyle = '#444'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            let fontSize = 38;
            if (block.length > 60) fontSize = 30;
            ctx.font = `bold ${fontSize}px "Hiragino Mincho ProN", serif`;
            
            const lineHeight = fontSize * 1.8;
            const totalHeight = lines.length * lineHeight;
            let startY = 400 - (totalHeight / 2) + (lineHeight / 2);

            lines.forEach((line, i) => {
                ctx.fillText(line, 400, startY + (i * lineHeight));
            });

            const dataUrl = canvas.toDataURL('image/png');
            const div = document.createElement('div');
            div.className = 'preview-card';
            div.innerHTML = `<img src="${dataUrl}"><a href="${dataUrl}" download="card_${index+1}.png" class="download-btn">📥</a>`;
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
