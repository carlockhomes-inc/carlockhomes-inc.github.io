<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarlockHomes 採用コンセプト - LIFE HUB (v26.0-PRO-DESIGN)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Outfit:wght@900&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      overflow-x: hidden;
      background: #FAF6EE;
    }

    /* ── Selector ── */
    #selector {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid #eee;
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .sel-btn {
      padding: 15px 35px;
      border-radius: 100px;
      border: none;
      background: #f0f0f0;
      color: #666;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }

    .sel-btn.active {
      background: linear-gradient(135deg, #FF4444, #FF6B2B);
      color: #fff;
      transform: scale(1.05);
      box-shadow: 0 6px 15px rgba(255, 68, 68, 0.3);
    }

    .design-section {
      display: none;
    }

    .design-section.active {
      display: block;
    }

    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* SVG Node Container */
    .node-wrap {
      position: relative;
      width: min(350px, 90vw);
      height: min(350px, 90vw);
      margin: 40px auto 100px;
    }

    .hub-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 170px;
      height: 170px;
      z-index: 10;
      animation: gentlePulse 4s ease-in-out infinite;
    }

    .node-item {
      position: absolute;
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      z-index: 5;
    }

    .node-label {
      font-size: 10px;
      font-weight: 900;
      margin-top: 2px;
    }
  </style>
</head>

      const centerX = 175;

      const radius = 135;

      labels.forEach((item, i) => {

        const y = centerY + radius * Math.sin(item.angle * Math.PI / 180) - 37.5;
        
        const div = document.createElement('div');
        div.className = 'node-item';
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.border = `3px solid ${item.color}`;
        div.style.animation = `fadeSlide .6s ease-out ${0.5 + i * 0.1}s both`;

          </div>
          <div class="node-label" style="color:${item.color}">${item.label}</div>
        `;
        container.appendChild(div);
      });
    }
