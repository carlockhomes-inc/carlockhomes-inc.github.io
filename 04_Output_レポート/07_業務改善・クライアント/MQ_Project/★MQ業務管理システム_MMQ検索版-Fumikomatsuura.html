<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQ Management Console | モリモトクオリティ専用</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --mq-deep-blue: #0A192F;
            /* 知的・高品位なネイビー */
            --mq-gold: #C5A028;
            /* アクセントのゴールド */
            --mq-border: #233554;
            --mq-text-main: #CCD6F6;
            --mq-text-sub: #8892B0;
            --mq-bg-light: #112240;
            --success: #64FFDA;
            --error: #FF4D4D;
            --highlight: #1d355d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--mq-deep-blue);
            color: var(--mq-text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--mq-border);
            background: linear-gradient(180deg, rgba(17, 34, 64, 1) 0%, rgba(10, 25, 47, 1) 100%);
        }

        h1 {
            font-size: 1.8rem;
            color: var(--mq-gold);
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--mq-text-sub);
            letter-spacing: 0.1rem;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            width: 95%;
            flex-grow: 1;
        }

        /* 検索セクション */
        .search-section {
            background-color: var(--mq-bg-light);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--mq-border);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        input[type="text"],
        textarea {
            background: var(--mq-deep-blue);
            border: 1px solid var(--mq-border);
            color: var(--mq-text-main);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--mq-gold);
            outline: none;
            box-shadow: 0 0 10px rgba(197, 160, 40, 0.2);
        }

        .btn {
            background: var(--mq-gold);
            color: var(--mq-deep-blue);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--mq-gold);
            color: var(--mq-gold);
        }

        /* 結果セクション */
        .result-section {
            display: none;
            /* 初期は非表示 */
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .data-card {
            background-color: var(--mq-bg-light);
            border-radius: 12px;
            border: 1px solid var(--mq-border);
            padding: 30px;
            margin-bottom: 30px;
        }

        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--mq-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .id-badge {
            background: var(--mq-deep-blue);
            color: var(--mq-gold);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid var(--mq-gold);
        }

        .label {
            display: block;
            font-size: 0.75rem;
            color: var(--mq-text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .data-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-box {
            padding: 10px 0;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .content-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-top: 5px;
            white-space: pre-wrap;
            border-left: 4px solid var(--mq-gold);
        }

        textarea.edit-area {
            min-height: 150px;
            margin-top: 10px;
            font-family: inherit;
        }

        #status-message {
            margin-top: 15px;
            font-size: 0.85rem;
            min-height: 1.2rem;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--mq-text-sub);
            font-size: 0.8rem;
        }

        /* タブ・物件マスタ用 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: var(--mq-bg-light);
            color: var(--mq-text-main);
            border: 1px solid var(--mq-border);
            padding: 12px 20px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            border-bottom: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        .tab-btn.active {
            background: var(--mq-gold);
            color: var(--mq-deep-blue);
        }

        .prop-item {
            padding: 15px;
            border-bottom: 1px solid var(--mq-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prop-item:last-child {
            border-bottom: none;
        }

        .prop-name {
            font-weight: bold;
            color: var(--mq-gold);
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .prop-address {
            font-size: 0.85rem;
            color: var(--mq-text-sub);
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .data-row {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>MQ Management Console</h1>
        <p class="subtitle">モリモトクオリティ 業務データ管理（専用版）</p>
    </header>

    <div class="container">
        <!-- タブメニュー -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-search')">案件管理</button>
            <button class="tab-btn" onclick="switchTab('tab-master')">物件マスタ（参照）</button>
        </div>

        <!-- 案件管理エリア (Tab 1) -->
        <div id="tab-search" class="tab-content">
            <!-- 検索エリア -->
            <section class="search-section">
            <span class="label">案件照会 (MMQ番号を入力)</span>
            <div class="input-group">
                <input type="text" id="mmq-search-id" placeholder="例: MMQ0331" autocomplete="off">
                <button class="btn" onclick="fetchMQData()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    読み込む
                </button>
            </div>
            <div id="status-message"></div>
        </section>

        <!-- データ結果エリア -->
        <section id="mq-result-area" class="result-section">
            <div class="data-card">
                <div class="data-header">
                    <h2>案件詳細</h2>
                    <span id="display-id" class="id-badge">MMQ----</span>
                </div>

                <div class="data-row">
                    <div class="info-box">
                        <span class="label">お客様名</span>
                        <div id="display-customer" class="info-value">---</div>
                    </div>
                    <div class="info-box">
                        <span class="label">受付日</span>
                        <div id="display-date" class="info-value">---</div>
                    </div>
                </div>

                <div class="info-box">
                    <span class="label">現在の対応状況・依頼内容</span>
                    <div id="display-content" class="content-display">
                        ---
                    </div>
                </div>

                <!-- 追記エリア -->
                <div style="margin-top: 30px; border-top: 1px solid var(--mq-border); padding-top: 20px;">
                    <span class="label" style="color: var(--mq-gold);">今回の追記・更新メモ</span>
                    <textarea id="edit-content" class="edit-area" placeholder="ここに対応内容などを入力してください..."></textarea>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
                    <button class="btn btn-secondary" onclick="clearAll()">クリア</button>
                    <button class="btn" onclick="saveMQData()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                <span class="label">物件名・住所で検索</span>
                <div class="input-group">
                    <input type="text" id="prop-search" placeholder="例: ピアース" autocomplete="off" oninput="filterProperties()">
                </div>
            </section>
            <div id="prop-loading" style="text-align: center; color: var(--mq-gold); display: none; padding: 20px;">
                物件データを読み込み中...
            </div>
            <div id="prop-list" class="data-card" style="display: none; padding: 0;">
                <!-- リストがここに生成されます -->
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 M-Lab | Morimoto Quality Business Support v1.0
    </footer>

    <script>
        // --- ☁️ CONFIGURATION: Google Apps Script URL ---
        // TODO: GASの「デプロイ」>「新しいデプロイ」>「ウェブアプリ」のURLをここに設定してください
        const MQ_GAS_URL = "https://script.google.com/macros/s/AKfycbxI0W6yeWSlqVwcLB_MUH0tO_1XHVcXj_mD6ffBRnzPWE4HwSyC4_uIkYpNwjAQHueb/exec";
        // 物件マスタ スプレッドシートCSV URL
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1K-eu0TSdgn2rAcbqI8S7gDYvLXJXJyb0SBCQaFGRuew/export?format=csv&gid=1927273400";

        const searchInput = document.getElementById('mmq-search-id');
        const statusMsg = document.getElementById('status-message');
        const resultArea = document.getElementById('mq-result-area');

        // エンターキーで検索
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchMQData();
        });

        // 🔍 データ取得 (Read)
        async function fetchMQData() {
            const id = searchInput.value.trim().toUpperCase();
            if (!id) {
                showStatus('受付番号を入力してください', 'error');
                return;
            }

            if (!MQ_GAS_URL) {
                showStatus('⚠️ GASのURLが未設定です。コード内を確認してください。', 'error');
                return;
            }

            showStatus('⌛ スプレッドシートからデータを取得中...', 'main');

            try {
                const response = await fetch(`${MQ_GAS_URL}?action=read&q=${id}`);
                const res = await response.json();

                if (res.status === 'success') {
                    document.getElementById('display-id').innerText = res.data.id || id;
                    document.getElementById('display-customer').innerText = res.data.customer || '不明';
                    document.getElementById('display-date').innerText = res.data.date || '---';
                    document.getElementById('display-content').innerText = res.data.content || '(内容なし)';

                    resultArea.style.display = 'block';
                    document.getElementById('edit-content').value = "";
                    showStatus('✅ データを読み込みました', 'success');
                } else {
                    showStatus('❌ 該当する番号が見つかりませんでした (' + id + ')', 'error');
                    resultArea.style.display = 'none';
                }
            } catch (error) {
                console.error(error);
                showStatus('❌ 通信エラーが発生しました。URL設定またはアクセス権を確認してください。', 'error');
            }
        }

        // 💾 データ保存・追記 (Write/Update)
        async function saveMQData() {
            const id = document.getElementById('display-id').innerText;
            const updatedContent = document.getElementById('edit-content').value;

            if (!updatedContent.trim()) {
                alert('追記する内容を入力してください。');
                return;
            }

            if (!MQ_GAS_URL) {
                showStatus('⚠️ GASのURLが未設定のため、保存できません。', 'error');
                return;
            }

            showStatus('⌛ スプレッドシートを更新中...', 'main');

            try {
                // GASへのPOST送信 (CORS対策のため、GAS側のdoPostで受ける)
                const response = await fetch(MQ_GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 簡易送信 (レスポンス確認不可だが送信は成功する)
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'update',
                        id: id,
                        new_content: updatedContent
                    })
                });

                // no-cors の場合はレスポンスが不透明なため、一定時間後に成功扱いとして再読込
                showStatus('✅ 送信しました。反映を確認します...', 'success');

                setTimeout(() => {
                    fetchMQData(); // 最新状態を再取得
                }, 2000);

            } catch (error) {
                showStatus('❌ 保存処理中にエラーが発生しました', 'error');
            }
        }

        function showStatus(msg, type) {
            statusMsg.innerText = msg;
            if (type === 'error') statusMsg.style.color = 'var(--error)';
            else if (type === 'success') statusMsg.style.color = 'var(--success)';
            else statusMsg.style.color = 'var(--mq-text-main)';
        }

        function clearAll() {
            searchInput.value = "";
            resultArea.style.display = 'none';
            statusMsg.innerText = "";
            document.getElementById('edit-content').value = "";
        }

        // --- タブ切り替えと物件マスタの処理 ---
        let propertyMasterData = [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).style.display = 'block';
            
            if(tabId === 'tab-search') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                if (propertyMasterData.length === 0) loadPropertyMaster();
            }
        }

        async function loadPropertyMaster() {
            const loading = document.getElementById('prop-loading');
            const list = document.getElementById('prop-list');
            
            loading.style.display = 'block';
            list.style.display = 'none';
            
            try {
                const response = await fetch(SHEET_CSV_URL);
                const text = await response.text();
                const rows = text.split('\n');
                
                propertyMasterData = rows.slice(1).map(row => {
                    let cols = row.split(','); // 簡易CSVパース
                    if(cols.length >= 2) {
                        return { 
                            name: cols[0].trim().replace(/^"|"$/g, ''), 
                            address: cols[1].trim().replace(/^"|"$/g, '') 
                        };
                    }
                    return null;
                }).filter(item => item && item.name);
                
                loading.style.display = 'none';
                list.style.display = 'block';
                renderProperties(propertyMasterData);
            } catch (error) {
                console.error(error);
                loading.innerText = "❌ データの読み込みに失敗しました。";
            }
        }

        function renderProperties(data) {
            const list = document.getElementById('prop-list');
            list.innerHTML = "";
            
            if (data.length === 0) {
                list.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--mq-text-sub);">該当する物件が見つかりません。</div>`;
                return;
            }

            data.slice(0, 500).forEach(prop => { // 最大500件まで表示
                const div = document.createElement('div');
                div.className = 'prop-item';
                div.innerHTML = `
                    <div>
                        <div class="prop-name">${prop.name}</div>
                        <div class="prop-address">${prop.address}</div>
                    </div>
                    <button class="btn btn-secondary btn-small" onclick="copyText(this, '${prop.name}\\n${prop.address}')">コピー</button>
                `;
                list.appendChild(div);
            });
        }

        function filterProperties() {
            const q = document.getElementById('prop-search').value.toLowerCase();
            const filtered = propertyMasterData.filter(prop => 
                prop.name.toLowerCase().includes(q) || prop.address.toLowerCase().includes(q)
            );
            renderProperties(filtered);
        }

        function copyText(btnElement, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = "コピー済!";
                btnElement.style.background = "var(--success)";
                btnElement.style.color = "var(--mq-deep-blue)";
                btnElement.style.borderColor = "var(--success)";
                
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.background = "transparent";
                    btnElement.style.color = "var(--mq-gold)";
                    btnElement.style.borderColor = "var(--mq-gold)";
                }, 2000);
            }).catch(err => {
                alert("コピーに失敗しました");
            });
        }
    </script>
</body>

</html>
