name: "🚨 Emergency Alert"

# Trigger on CI failures, manual dispatch, and periodic health checks
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours (UTC)

jobs:
  alert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # -------------------------------------------------
      # 1️⃣ Detect CI failure
      # -------------------------------------------------
      - name: Detect CI failure
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' }}
        run: |
          echo "*⚠️ CI FAILURE*" > msg.txt
          echo "Repository: ${{ github.repository }}" >> msg.txt
          echo "Workflow: ${{ github.event.workflow_run.name }}" >> msg.txt
          echo "Run ID: ${{ github.event.workflow_run.id }}" >> msg.txt
          echo "URL: ${{ github.event.workflow_run.html_url }}" >> msg.txt

      # -------------------------------------------------
      # 2️⃣ Check 2FA status (runs only on schedule)
      # -------------------------------------------------
      - name: Check 2FA status
        if: ${{ github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status=$(gh api user --jq .two_factor_authentication 2>/dev/null) || true
          if [ "$status" = "false" ]; then
            echo "*⚠️ 2FA DISABLED*" > msg.txt
            echo "Repository: ${{ github.repository }}" >> msg.txt
          elif [ -z "$status" ]; then
            echo "ℹ️ 2FA check skipped (token lacks user scope)"
          else
            echo "✅ 2FA is enabled"
          fi

      # -------------------------------------------------
      # 3️⃣ Send Slack alert (Skips if SLACK_WEBHOOK_URL is not configured)
      # -------------------------------------------------
      - name: Send Slack alert
        # SlackのWebhook URLが設定されている場合のみ実行します。
        # 未設定の場合はこのステップ自体がスキップされ、エラー（×）になりません。
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -f msg.txt ]; then
            echo "🚀 Sending alert to Slack..."
            payload=$(jq -Rs '{text: .}' < msg.txt)
            curl -s -f -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
          else
            echo "ℹ️ No message to send."
          fi
