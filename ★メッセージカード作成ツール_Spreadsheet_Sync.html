<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Card Maker | Safe Paste Edition</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;700&family=Kaisei+Opti:wght@700&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-gold: #a67c37;
            --bg-dark: #0f1115;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-light: #e0e0e0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at top right, #1a1c23, #0f1115);
            color: var(--text-light);
            margin: 0; padding: 40px 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .premium-header { text-align: center; margin-bottom: 40px; }
        .premium-header h1 {
            font-family: 'Noto Serif JP', serif; font-size: 2.2em; letter-spacing: 0.1em;
            background: linear-gradient(to bottom, #fdfcfb 0%, #e2d1c3 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .premium-header p { color: var(--primary-gold); letter-spacing: 0.2em; font-size: 0.7em; margin: 5px 0; font-weight: bold; }

        .container {
            max-width: 900px; width: 100%; background: var(--card-glass); backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass); border-radius: 30px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); box-sizing: border-box;
        }

        .step-section { margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid var(--border-glass); }
        .step-section:last-of-type { border-bottom: none; margin-bottom: 20px; }
        
        .step-label { color: var(--primary-gold); font-weight: 700; font-size: 1.1em; letter-spacing: 0.1em; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .step-label span { background: var(--primary-gold); color: black; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; min-width: 28px; font-weight: 900; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group label { font-size: 0.85em; opacity: 0.8; font-weight: 600; color: var(--primary-gold); }

        .setting-input {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass);
            border-radius: 12px; padding: 14px; color: white; font-size: 15px; width: 100%; box-sizing: border-box; transition: 0.3s;
        }

        /* 🔘 Paste Area */
        .paste-area {
            width: 100%; height: 100px; background: rgba(0,0,0,0.3); border: 2px dashed var(--primary-gold);
            border-radius: 15px; padding: 15px; color: white; font-size: 14px; resize: none; box-sizing: border-box;
            transition: 0.3s; text-align: center; display: flex; align-items: center; justify-content: center;
        }
        .paste-area:focus { background: rgba(197, 160, 89, 0.1); border-color: white; outline: none; }

        /* 🔳 Mode Selection A/B */
        .mode-selector {
            display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 15px;
        }
        .mode-btn {
            flex: 1; padding: 12px; border-radius: 10px; border: none; background: transparent; color: white;
            cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s;
        }
        .mode-btn.active {
            background: var(--primary-gold); color: black; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
        }

        .styling-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; margin-top: 20px; }
        .color-picker-box { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border-glass); }
        
        .btn-generate {
            background: linear-gradient(135deg, var(--primary-gold), var(--dark-gold));
            color: #000; border: none; padding: 20px 80px; border-radius: 60px;
            font-weight: 700; font-size: 1.3em; cursor: pointer; transition: 0.3s;
            display: block; margin: 40px auto; box-shadow: 0 10px 30px rgba(166, 124, 55, 0.4);
        }
        .btn-generate:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 15px 40px rgba(166, 124, 55, 0.6); }

        .preview-area { width: 100%; margin-top: 60px; }
        .section-title { font-family: 'Noto Serif JP', serif; font-size: 1.5em; text-align: center; color: var(--primary-gold); margin-bottom: 20px; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; }

        .card-item { 
            position: relative; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); border: 1px solid var(--border-glass); 
            background: #000; transition: 0.3s;
        }
        .card-item img { width: 100%; display: block; object-fit: cover; }
        
        .card-actions { 
            background: #111; padding: 20px; display: flex; flex-direction: column; gap: 12px; 
            border-top: 1px solid var(--border-glass);
        }

        .btn-save { 
            width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 700; 
            text-align: center; border: none; cursor: pointer; transition: 0.2s; 
        }
        .btn-png { background: white; color: black; box-shadow: 0 4px 0 #ccc; }
        .btn-png:hover { background: var(--primary-gold); transform: translateY(2px); box-shadow: 0 2px 0 #a67c37; }

        .dl-tip { 
            background: rgba(197, 160, 89, 0.1); border: 1px dashed var(--primary-gold);
            padding: 15px; border-radius: 15px; color: var(--primary-gold); 
            font-size: 13px; text-align: center; margin: 20px 0; font-weight: bold; line-height: 1.6;
        }

        .data-status { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<header class="premium-header">
    <h1>Message Card Maker</h1>
    <p>Safe Paste Edition | 100% Security</p>
</header>

<div class="container">
    
    <!-- STEP 00: SAFE PASTE -->
    <div class="step-section">
        <div class="step-label"><span>🛡️</span> 100% SAFE PASTE</div>
        <div class="input-group">
            <label>スプシで選択・コピーして、ここに貼り付け（Ctrl + V）</label>
            <textarea id="safe-paste-area" class="paste-area" placeholder="ここに貼り付けると、自動で言葉を拾います"></textarea>
            <div id="data-status" class="data-status">※ データは外部へ送信されないので安心です</div>
        </div>
    </div>

    <!-- STEP 01: MODE & BACKGROUND -->
    <div class="step-section">
        <div class="step-label"><span>1</span> MODE & BACKGROUND</div>
        
        <label style="font-size: 0.85em; opacity: 0.8; margin-bottom: 10px; display: block; font-weight: bold;">同期モードを選択（AかBか）</label>
        <div class="mode-selector">
            <button id="mode-a" class="mode-btn active" onclick="setMode('A')">Type A (A列のみ)</button>
            <button id="mode-b" class="mode-btn" onclick="setMode('B')">Type B (A列=メッセージ / B列=署名)</button>
        </div>

        <div class="form-grid">
            <div class="input-group">
                <label>自分の写真を使う</label>
                <input type="file" id="bg-input" accept="image/*" class="setting-input">
            </div>
            <div class="input-group">
                <label>高品質テーマから選ぶ</label>
                <select id="bg-preset" class="setting-input">
                    <option value="none">-- 選択してください --</option>
                    <option value="dark">漆黒 (Standard Dark)</option>
                    <option value="marble">高級大理石 (White Marble)</option>
                    <option value="silk">ラグジュアリーシルク (Beige Silk)</option>
                    <option value="gold">金箔テクスチャ (Gold Foil)</option>
                    <option value="paper">上質な和紙 (Premium Washi)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- STEP 02: サイズ -->
    <div class="step-section">
        <div class="step-label"><span>2</span> CANVAS SIZE</div>
        <div class="input-group">
            <label>目的のSNSサイズに合わせて選択</label>
            <select id="size-select" class="setting-input">
                <option value="1:1">正方形 (1:1)</option>
                <option value="9:16">縦長 (9:16)</option>
                <option value="16:9">横長 (16:9)</option>
            </select>
        </div>
    </div>

    <!-- STEP 03: 詳細設定 -->
    <div class="step-section">
        <div class="step-label"><span>3</span> DETAILED STYLING</div>
        <div class="styling-grid">
            <div class="input-group">
                <label>カラー</label>
                <div style="display:flex; gap:12px;">
                    <div class="color-picker-box">
                        <span style="font-size:10px; font-weight:bold;">文字色</span>
                        <input type="color" id="text-color" value="#ffffff" style="width:34px; height:34px; border:none; background:none; cursor:pointer;">
                    </div>
                    <div class="color-picker-box">
                        <span style="font-size:10px; font-weight:bold;">枠線の色</span>
                        <input type="color" id="frame-color" value="#c5a059" style="width:34px; height:34px; border:none; background:none; cursor:pointer;">
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label>フォント</label>
                <select id="font-select" class="setting-input">
                    <option value="'Noto Serif JP', serif">明朝体</option>
                    <option value="'Noto Sans JP', sans-serif">ゴシック</option>
                    <option value="'Kaisei Opti', serif">装飾字体</option>
                    <option value="'Yuji Syuku', serif">筆文字風</option>
                </select>
            </div>
            <div class="input-group">
                <label>署名（Type Aのみ反映）</label>
                <input type="text" id="brand-input" class="setting-input" value="M-LAB PREMIUM">
            </div>
        </div>
        <div class="styling-grid">
            <div class="input-group"><label>文字サイズ</label><input type="range" id="font-size-range" min="0.5" max="3.0" step="0.1" value="1.0"></div>
            <div class="input-group"><label>枠線の太さ</label><input type="range" id="frame-thickness-range" min="0" max="100" step="1" value="20"></div>
            <div class="input-group"><label>背景明るさ</label><input type="range" id="overlay-range" min="0" max="0.95" step="0.05" value="0.4"></div>
        </div>
    </div>

    <button class="btn-generate" onclick="generateCards()">一括生成する</button>

</div>

<div class="preview-area">
    <div class="section-title">✨ PREVIEW RESULTS</div>
    <div id="preview-grid" class="preview-grid"></div>
</div>

<div class="preview-area" style="margin-top: 80px; border-top: 2px solid var(--primary-gold); padding-top: 40px;">
    <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px;">
        <div class="section-title" style="margin-bottom:0;">🏆 My Collection</div>
        <button onclick="clearCollection()" style="background: rgba(255,0,0,0.2); color: #ff6b6b; border: 1px solid #ff6b6b; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;">クリア</button>
    </div>
    <div id="collection-grid" class="preview-grid"></div>
</div>

<canvas id="worker-canvas" style="display:none;"></canvas>

<script>
    const presets = {
        marble: 'https://images.unsplash.com/photo-1542283938-238248373393?q=80&w=1200&auto=format&fit=crop',
        silk: 'https://images.unsplash.com/photo-1549490349-8643362247b5?q=80&w=1200&auto=format&fit=crop',
        gold: 'https://images.unsplash.com/photo-1502220389384-75496525977a?q=80&w=1200&auto=format&fit=crop',
        paper: 'https://images.unsplash.com/photo-1598918239080-87a3875a6104?q=80&w=1200&auto=format&fit=crop'
    };

    let userBgImage = null;
    let presetImage = null;
    let currentMode = 'A';
    let pastedRows = [];

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mode-a').classList.toggle('active', mode==='A');
        document.getElementById('mode-b').classList.toggle('active', mode==='B');
        generateCards();
    }

    // 🛡️ Safe Paste Logic (Tab Separated)
    document.getElementById('safe-paste-area').oninput = function(e) {
        const text = e.target.value;
        if(!text.trim()) return;
        
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        pastedRows = lines.map(line => line.split("\t").map(cell => cell.trim()));

        document.getElementById('data-status').innerHTML = `✅ ${pastedRows.length} 件のメッセージを読み取りました！`;
        generateCards();
    };

    document.getElementById('bg-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { 
            const img = new Image(); 
            img.onload = () => { userBgImage = img; presetImage = null; document.getElementById('bg-preset').value = 'none'; generateCards(); }; 
            img.src = ev.target.result; 
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('bg-preset').onchange = (e) => {
        userBgImage = null; document.getElementById('bg-input').value = '';
        if(e.target.value==='none'||e.target.value==='dark'){ presetImage=null; generateCards(); return; }
        const img = new Image(); img.crossOrigin = "anonymous"; 
        img.onload = () => { presetImage = img; generateCards(); };
        img.src = presets[e.target.value] + "?cb=" + Date.now();
    };

    function addToCollection(canvas, type) {
        const grid = document.getElementById('collection-grid');
        const wrapper = document.createElement('div');
        wrapper.className = 'card-item';
        if(canvas.height > canvas.width) wrapper.style.gridRow="span 2";
        const img = document.createElement('img');
        img.src = canvas.toDataURL(type === 'jpg' ? 'image/jpeg' : 'image/png');
        const info = document.createElement('div');
        info.style = "background: #1a1a1a; padding: 10px; font-size: 11px; text-align: center; color: var(--primary-gold); font-weight: bold;";
        info.innerText = `SAVED - ${new Date().toLocaleTimeString()}`;
        wrapper.appendChild(img);
        wrapper.appendChild(info);
        grid.prepend(wrapper);
    }

    function clearCollection() { if(confirm('クリアしますか？')) document.getElementById('collection-grid').innerHTML = ''; }

    async function superSave(canvas, filename) {
        const finalName = filename + '.png';
        addToCollection(canvas, 'png');
        try {
            if (window.showSaveFilePicker) {
                const handle = await window.showSaveFilePicker({ suggestedName: finalName, types: [{ description: 'PNG', accept: { 'image/png': ['.png'] } }] });
                const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                const writable = await handle.createWritable();
                await writable.write(blob); await writable.close(); return;
            }
        } catch (e) {}
        canvas.toBlob((blob) => { const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = finalName; a.click(); });
    }

    function generateCards() {
        const container = document.getElementById('preview-grid');
        const worker = document.getElementById('worker-canvas');
        const ctx = worker.getContext('2d');
        const setup = {
            overlay: document.getElementById('overlay-range').value,
            font: document.getElementById('font-select').value,
            sizeScale: parseFloat(document.getElementById('font-size-range').value),
            frameT: parseFloat(document.getElementById('frame-thickness-range').value),
            ratio: document.getElementById('size-select').value,
            textColor: document.getElementById('text-color').value,
            frameColor: document.getElementById('frame-color').value,
            manualBrand: document.getElementById('brand-input').value || 'M-LAB'
        };

        if (pastedRows.length === 0) { container.innerHTML='<p style="text-align:center; padding: 40px; color:#888;">スプシでコピーして貼り付けると、ここにカードが表示されます。</p>'; return; }

        let w = 1080, h = 1080;
        if(setup.ratio==='9:16'){ h=1920; } else if(setup.ratio==='16:9'){ w=1920; }
        worker.width = w; worker.height = h;
        container.innerHTML = '';

        pastedRows.forEach((row, index) => {
            const mainMsg = row[0] || '';
            const subText = (currentMode === 'B') ? (row[1] || '') : setup.manualBrand;

            ctx.clearRect(0,0,w,h);
            const bg = userBgImage || presetImage;
            if(bg){
                const a = bg.width/bg.height, ca = w/h;
                let dw, dh, dx, dy;
                if(a>ca){ dh=bg.height; dw=dh*ca; dx=(bg.width-dw)/2; dy=0; }
                else { dw=bg.width; dh=dw/ca; dx=0; dy=(bg.height-dh)/2; }
                ctx.drawImage(bg, dx, dy, dw, dh, 0, 0, w, h);
            } else { ctx.fillStyle="#0f1115"; ctx.fillRect(0,0,w,h); }

            ctx.fillStyle=`rgba(0,0,0,${setup.overlay})`; ctx.fillRect(0,0,w,h);
            if (setup.frameT > 0) {
                ctx.strokeStyle = setup.frameColor; ctx.lineWidth = setup.frameT;
                const offset = setup.frameT / 2 + (w * 0.04); ctx.strokeRect(offset, offset, w - offset * 2, h - offset * 2);
            }

            ctx.fillStyle = setup.textColor; ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.shadowColor="rgba(0,0,0,0.5)"; ctx.shadowBlur=20;
            let sz = (w*0.06)*setup.sizeScale;
            ctx.font=`600 ${sz}px ${setup.font}`;
            const lines = mainMsg.split('\\n');
            lines.forEach((l,i) => ctx.fillText(l.trim(), w/2, h/2 + (i-(lines.length-1)/2)*sz*1.6));

            ctx.font=`bold ${w*0.024}px 'Inter'`; ctx.fillStyle = setup.frameColor;
            ctx.textAlign="right"; ctx.fillText(subText, w-(w*0.08), h-(h*0.08));

            const cardCanvas = document.createElement('canvas');
            cardCanvas.width = w; cardCanvas.height = h;
            cardCanvas.getContext('2d').drawImage(worker, 0, 0);

            const wrapper = document.createElement('div');
            wrapper.className='card-item';
            if(setup.ratio==='9:16') wrapper.style.gridRow="span 2";
            const thumb = document.createElement('img'); thumb.src = cardCanvas.toDataURL('image/png');
            const ctrls = document.createElement('div'); ctrls.className = 'card-actions';
            const btn = document.createElement('button'); btn.className = 'btn-save btn-png'; btn.innerText = '名前を付けて保存';
            btn.onclick = () => superSave(cardCanvas, `PastedCard_${index+1}`);
            ctrls.appendChild(btn); wrapper.appendChild(thumb); wrapper.appendChild(ctrls); container.appendChild(wrapper);
        });
    }

    document.querySelectorAll('.setting-input, #bg-preset, #size-select, #font-select, #text-color, #frame-color, #frame-thickness-range, #font-size-range, #overlay-range, #brand-input').forEach(el => el.oninput = generateCards);
</script>
</body>
</html>
